<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PuppyTalk - 챗봇 서비스</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .main-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 15px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .chat-wrapper {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 600px;
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background-color: white;
            text-align: center;
        }

        .chat-header h5 {
            font-weight: 800;
            color: var(--text-main);
            margin: 0 0 0.3rem 0;
        }

        .chat-header small {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #DDDDDD;
            border-radius: 10px;
        }

        .message {
            max-width: 75%;
            padding: 0.8rem 1.2rem;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 2px 8px rgba(255,138,101,0.25);
        }

        .bot-message {
            background-color: var(--input-bg);
            color: var(--text-main);
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
            border: 1px solid var(--border-color);
        }

        .chat-input-area {
            padding: 1.2rem 1.5rem;
            border-top: 1px solid var(--border-color);
            background-color: white;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
            margin: 0;
        }

        .custom-input {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            background-color: var(--input-bg);
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
            background-color: white;
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-custom:hover {
            background-color: var(--primary-hover);
            color: white;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container main-container">
    <div class="page-header">
        <h2>💬 퍼피톡 AI 챗봇</h2>
    </div>

    <div class="chat-wrapper">
        <div class="chat-header">
            <h5>🐾 PuppyTalk 챗봇</h5>
            <small>강아지에 대해 무엇이든 물어보세요!</small>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                안녕하세요! 강아지에 대해 궁금한 점이 있다면 무엇이든 물어보세요. 🐶
            </div>
        </div>

        <div class="chat-input-area">
            <form id="chat-form" class="search-box">
                <input type="text" id="message-input" class="custom-input" placeholder="메시지를 입력하세요..." autocomplete="off" required>
                <button class="btn-custom" type="submit">전송</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const chatMessages = document.getElementById('chat-messages');

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userMessage = messageInput.value.trim();
        if (!userMessage) return;

        addMessage(userMessage, 'user');
        messageInput.value = '';

        const typingIndicator = document.createElement('div');
        typingIndicator.classList.add('message', 'bot-message');
        typingIndicator.innerHTML = `
                <div class="d-flex align-items-center">
                    <span class="spinner-grow spinner-grow-sm me-2" style="color: var(--primary-color);" role="status" aria-hidden="true"></span>
                    <strong style="color: var(--text-sub);">답변을 생각하고 있어요...</strong>
                </div>
            `;
        chatMessages.appendChild(typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ question: userMessage }),
            });

            typingIndicator.remove();

            if (response.ok) {
                const botAnswer = await response.text();
                addMessage(botAnswer, 'bot');
            } else {
                const errorText = await response.text();
                addMessage(`오류가 발생했습니다: ${errorText}`, 'bot');
            }
        } catch (error) {
            typingIndicator.remove();
            console.error('챗봇 요청 실패:', error);
            addMessage('죄송합니다, 서버와 통신하는 데 문제가 발생했어요.', 'bot');
        }
    });
</script>
</body>
</html>
