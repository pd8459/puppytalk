<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 로그인</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
        }

        .login-container {
            background-color: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        .header-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-title p {
            margin: 0.5rem 0 0 0;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(255, 138, 101, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
            border: none;
            border-radius: 12px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-sub);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #EEEEEE;
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.85rem;
            margin-bottom: 0.6rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.1s ease;
            box-sizing: border-box;
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        .social-btn img {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            display: inline-block;
        }

        .naver-icon {
            font-weight: 900;
            font-size: 16px;
            margin-right: 8px;
        }

        .btn-kakao {
            background-color: #FEE500;
            color: #191919;
        }

        .btn-google {
            background-color: white;
            color: #333333;
            border: 1px solid #DDDDDD;
        }

        .btn-naver {
            background-color: #03C75A;
            color: white;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        #message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header-title">
        <h1>🐶 퍼피톡 시작하기</h1>
        <p>다시 만나서 반가워요!</p>
    </div>

    <form id="login-form">
        <div class="input-group">
            <label for="username">아이디</label>
            <input type="text" id="username" required>
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">로그인</button>
    </form>

    <div id="message"></div>

    <div class="divider">또는 다음으로 로그인</div>

    <a th:href="@{|https://kauth.kakao.com/oauth/authorize?client_id=${kakaoClientId}&redirect_uri=http://localhost:8080/api/user/kakao/callback&response_type=code|}" class="social-btn btn-kakao">
        <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_small.png" alt="Kakao">
        카카오로 시작하기
    </a>

    <a th:href="@{|https://accounts.google.com/o/oauth2/v2/auth?client_id=${googleClientId}&redirect_uri=http://localhost:8080/api/user/google/callback&response_type=code&scope=email%20profile|}" class="social-btn btn-google">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
        구글로 시작하기
    </a>

    <a th:href="@{|https://nid.naver.com/oauth2.0/authorize?client_id=${naverClientId}&redirect_uri=http://localhost:8080/api/user/naver/callback&response_type=code&state=${naverState}|}" class="social-btn btn-naver">
        <span class="naver-icon">N</span>
        네이버로 시작하기
    </a>

    <div class="footer-links">
        계정이 없으신가요? <a href="/signup">회원가입</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async function(event) {
        event.preventDefault();
        const messageDiv = document.getElementById('message');
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                messageDiv.textContent = '로그인 성공! 멍멍! 🐶';
                messageDiv.style.color = '#2E7D32';
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectURL = urlParams.get('redirectURL');
                    window.location.href = redirectURL || '/main';
                }, 1000);
            } else {
                const errorText = await response.text();
                messageDiv.textContent = errorText || '로그인에 실패했습니다.';
                messageDiv.style.color = '#C62828';
            }
        } catch (error) {
            messageDiv.textContent = '오류가 발생했습니다.';
            messageDiv.style.color = '#C62828';
        }
    });
</script>

</body>
</html>
