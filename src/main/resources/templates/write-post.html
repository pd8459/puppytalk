<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 새 글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .write-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 15px;
        }

        .write-card {
            background-color: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: none;
        }

        .page-title {
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .custom-input, .custom-select {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            background-color: var(--input-bg);
            width: 100%;
            font-family: inherit;
            transition: all 0.2s;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .custom-input:focus, .custom-select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.1);
        }

        .title-input {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            color: white;
        }

        .btn-cancel {
            background-color: #F5F5F5;
            color: var(--text-sub);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-cancel:hover {
            background-color: #EEEEEE;
            color: var(--text-main);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        #editor {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="write-container">
    <div class="write-card">
        <h2 class="page-title">✍️ 새 글 작성</h2>

        <form id="post-form">
            <div class="mb-4">
                <label for="post-category" class="form-label">카테고리</label>
                <select class="custom-select" id="post-category" required>
                    <option value="" disabled selected>어떤 주제의 글인가요?</option>
                    <option value="FREE_BOARD">자유게시판</option>
                    <option value="TRAINING_TIPS">훈련 꿀팁</option>
                    <option value="HEALTH_INFO">건강 정보</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="post-title" class="form-label">제목</label>
                <input type="text" class="custom-input title-input" id="post-title" placeholder="제목을 입력해주세요" required>
            </div>

            <div class="mb-2">
                <label class="form-label">내용</label>
                <div id="editor"></div>
            </div>

            <div class="button-group">
                <a href="/main" class="btn-cancel">취소</a>
                <button type="submit" class="btn-custom">작성하기</button>
            </div>
        </form>
        <div id="post-message" class="mt-3"></div>
    </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'markdown',
        previewStyle: 'vertical',
        placeholder: '반려견과 함께한 즐거운 이야기, 유용한 정보들을 자유롭게 적어주세요! 🐶',
        hooks: {
            addImageBlobHook: async (blob, callback) => {
                const formData = new FormData();
                formData.append('image', blob);
                try {
                    const response = await fetch('/api/images', {
                        method: 'POST',
                        body: formData,
                    });
                    if (!response.ok) throw new Error('이미지 업로드 실패');
                    const data = await response.json();
                    callback(data.url, 'image');
                } catch (error) {
                    alert('이미지 업로드에 실패했습니다.');
                }
            }
        }
    });

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('/api/profile');
            if (!response.ok) {
                alert('글을 작성하려면 로그인이 필요합니다.');
                window.location.href = '/login';
            }
        } catch (error) {
            alert('인증 상태 확인 중 오류가 발생했습니다.');
            window.location.href = '/main';
        }
    });

    document.getElementById('post-form').addEventListener('submit', async function(event) {
        event.preventDefault();
        const title = document.getElementById('post-title').value;
        const content = editor.getMarkdown();
        const category = document.getElementById('post-category').value;
        const messageDiv = document.getElementById('post-message');

        if (!category) {
            alert('카테고리를 선택해주세요.');
            return;
        }

        try {
            const response = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, category })
            });

            if (response.ok) {
                window.location.href = '/main';
            } else {
                const resultText = await response.text();
                messageDiv.innerHTML = `<div class="alert alert-danger" style="border-radius: 12px;">${resultText}</div>`;
            }
        } catch (error) {
            messageDiv.innerHTML = '<div class="alert alert-danger" style="border-radius: 12px;">게시글 작성 중 오류가 발생했습니다.</div>';
        }
    });
</script>
</body>
</html>
