<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 상품 관리 (관리자)</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .admin-container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-custom-main {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-custom-main:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,138,101,0.2);
        }

        .table-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            overflow-x: auto;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
        }

        .custom-table th {
            background-color: var(--input-bg);
            color: var(--text-sub);
            font-weight: 700;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .custom-table th:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .custom-table th:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .custom-table td {
            padding: 1rem;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .custom-table tbody tr:hover td {
            background-color: #FFFDFB;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .product-img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: white;
        }

        .product-name {
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.05rem;
        }

        .badge-custom {
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .btn-action {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-edit {
            background-color: var(--input-bg);
            color: var(--text-main);
            border-color: var(--border-color);
            text-decoration: none;
            margin-right: 4px;
        }

        .btn-edit:hover {
            background-color: white;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-delete {
            background-color: #FFF0F0;
            color: #D32F2F;
        }

        .btn-delete:hover {
            background-color: #FFCDD2;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .pagination .page-link {
            border: none;
            border-radius: 10px;
            margin: 0 4px;
            color: var(--text-main);
            font-weight: 700;
            padding: 8px 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(255,138,101,0.3);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-container">
    <div class="page-header">
        <h2><i class="fa-solid fa-boxes-stacked" style="color: var(--primary-color);"></i> 상품 관리</h2>
        <a href="/shop/register" class="btn-custom-main"><i class="fa-solid fa-plus"></i> 새 상품 등록</a>
    </div>

    <div class="table-card">
        <table class="custom-table">
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th style="width: 100px;">이미지</th>
                <th class="text-start">상품명</th>
                <th>가격</th>
                <th>재고</th>
                <th>상태</th>
                <th style="width: 150px;">관리</th>
            </tr>
            </thead>
            <tbody id="product-list-body">
            <tr>
                <td colspan="7" class="empty-state">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 fw-bold">상품 목록을 불러오는 중입니다...</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav aria-label="Page navigation" class="mt-5">
        <ul class="pagination justify-content-center flex-wrap" id="pagination"></ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('Authorization');

    window.addEventListener('DOMContentLoaded', () => {
        loadProducts(0);
    });

    async function loadProducts(page) {
        const tbody = document.getElementById('product-list-body');

        try {
            // 🚨 백엔드 API 주소와 완벽하게 일치하도록 '/admin/api/products' 로 수정했습니다!
            const response = await fetch(`/admin/api/products?page=${page}`, {
                headers: { 'Authorization': token }
            });

            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    alert('관리자 권한이 필요합니다.');
                    window.location.href = '/main';
                    return;
                }
                throw new Error('상품 목록을 불러오는데 실패했습니다.');
            }

            const data = await response.json();
            const products = data.content || data.data || data;

            tbody.innerHTML = '';

            if (!products || products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fa-solid fa-box-open"></i>
                            <h5 class="fw-bold">등록된 상품이 없습니다.</h5>
                        </td>
                    </tr>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            let html = '';
            products.forEach(p => {
                let statusBadge = p.status === 'ON_SALE' ? '<span class="badge badge-custom bg-success bg-opacity-10 text-success border border-success border-opacity-25">판매중</span>' :
                    p.status === 'SOLD_OUT' ? '<span class="badge badge-custom bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25" style="color: #F57C00 !important;">품절</span>' :
                        '<span class="badge badge-custom bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25">숨김</span>';

                const thumbnailUrl = p.thumbnailUrl || '/images/no-image.png';
                const formattedPrice = p.price ? p.price.toLocaleString() : '0';

                html += `
                    <tr>
                        <td class="text-muted fw-bold">#${p.id}</td>
                        <td><img src="${thumbnailUrl}" class="product-img" onerror="this.src='/images/no-image.png'"></td>
                        <td class="text-start product-name">${p.name}</td>
                        <td class="fw-bold">${formattedPrice}원</td>
                        <td class="fw-bold text-primary">${p.stockQuantity}개</td>
                        <td>${statusBadge}</td>
                        <td>
                            <a href="/admin/products/edit?id=${p.id}" class="btn-action btn-edit">수정</a>
                            <button class="btn-action btn-delete" onclick="deleteProduct(${p.id})">삭제</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            if (data.totalPages !== undefined) {
                renderPagination(data);
            }

        } catch (error) {
            console.error(error);
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state text-danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <p class="fw-bold">${error.message}</p>
                    </td>
                </tr>
            `;
        }
    }

    function renderPagination(pageData) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (pageData.totalPages <= 1) return;

        const currentPage = pageData.number;
        const totalPages = pageData.totalPages;
        const displayPageCount = 5;

        let startPage = Math.floor(currentPage / displayPageCount) * displayPageCount;
        let endPage = startPage + displayPageCount - 1;
        if (endPage >= totalPages) endPage = totalPages - 1;

        const createPageItem = (text, targetPage, isCurrent = false, isDisabled = false) => {
            const li = document.createElement('li');
            li.className = `page-item ${isCurrent ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href = '#';
            a.textContent = text;
            if (!isDisabled) {
                a.onclick = (e) => {
                    e.preventDefault();
                    loadProducts(targetPage);
                    window.scrollTo(0, 0);
                };
            }
            li.appendChild(a);
            container.appendChild(li);
        };

        if (currentPage > 0) {
            createPageItem('«', 0);
            createPageItem('‹', currentPage - 1);
        }

        for (let i = startPage; i <= endPage; i++) {
            createPageItem(i + 1, i, i === currentPage);
        }

        if (currentPage < totalPages - 1) {
            createPageItem('›', currentPage + 1);
            createPageItem('»', totalPages - 1);
        }
    }

    async function deleteProduct(id) {
        if (!confirm('정말로 이 상품을 삭제하시겠습니까?')) return;

        try {
            const response = await fetch(`/admin/api/products/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });

            if (response.ok) {
                alert('상품이 삭제되었습니다.');
                loadProducts(0);
            } else {
                const errorText = await response.text();
                alert('삭제 실패: ' + errorText);
            }
        } catch (error) {
            alert('오류가 발생했습니다.');
        }
    }
</script>
</body>
</html>
