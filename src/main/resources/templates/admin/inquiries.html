<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - CS 문의 관리</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .admin-container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background-color: white;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background-color: var(--input-bg);
            color: var(--text-main);
        }

        .table-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
        }

        .custom-table th {
            background-color: var(--input-bg);
            color: var(--text-sub);
            font-weight: 700;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .custom-table th:first-child { border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
        .custom-table th:last-child { border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

        .custom-table td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 0.95rem;
        }

        .custom-table tbody tr:hover td {
            background-color: #FFFDFB;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .user-name {
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .msg-preview {
            color: var(--text-sub);
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0 auto;
        }

        .time-text {
            color: #AAAAAA;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .btn-reply {
            background-color: #E3F2FD;
            color: #1976D2;
            border: 1px solid #BBDEFB;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-reply:hover {
            background-color: #BBDEFB;
            transform: translateY(-2px);
            color: #1565C0;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .pagination .page-link {
            border: none;
            border-radius: 10px;
            margin: 0 4px;
            color: var(--text-main);
            font-weight: 700;
            padding: 8px 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(255,138,101,0.3);
        }

        .pagination .page-item.disabled .page-link {
            background-color: transparent;
            color: #ccc;
            box-shadow: none;
            cursor: default;
        }

        .pagination .page-link:hover:not(.active):not(.disabled) {
            background-color: var(--input-bg);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-container">
    <div class="page-header">
        <h2 class="page-title">
            <i class="fa-solid fa-headset" style="color: var(--primary-color);"></i> 고객 문의 관리 (CS)
        </h2>
        <a href="/admin" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 대시보드로</a>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="custom-table">
                <thead>
                <tr>
                    <th style="width: 180px;">고객명</th>
                    <th class="text-start">최근 메시지</th>
                    <th style="width: 200px;">문의 시간</th>
                    <th style="width: 150px;">관리</th>
                </tr>
                </thead>
                <tbody id="inquiry-list">
                <tr>
                    <td colspan="4" class="empty-state">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 fw-bold">문의 내역을 불러오는 중입니다...</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center flex-wrap mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('Authorization');
    const pageSize = 20;

    let rawDataCache = null;

    window.addEventListener('DOMContentLoaded', () => {
        loadInquiries(0);
    });

    async function loadInquiries(page) {
        const listContainer = document.getElementById('inquiry-list');

        try {
            let items = [];
            let totalPages = 1;
            let currentPage = page;

            if (!rawDataCache) {
                const response = await fetch(`/api/messages?page=${page}&size=${pageSize}`, {
                    headers: { 'Authorization': token }
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        alert('권한이 없습니다.');
                        window.location.href = '/main';
                        return;
                    }
                    throw new Error('문의 내역 로드 실패');
                }

                const data = await response.json();

                if (data.content !== undefined) {
                    items = data.content;
                    totalPages = data.totalPages;
                    currentPage = data.number;
                } else if (Array.isArray(data)) {
                    rawDataCache = data;
                }
            }

            if (rawDataCache) {
                totalPages = Math.ceil(rawDataCache.length / pageSize) || 1;
                if (page >= totalPages) page = totalPages - 1;
                if (page < 0) page = 0;
                currentPage = page;
                items = rawDataCache.slice(page * pageSize, (page + 1) * pageSize);
            }

            let html = '';
            if (!items || items.length === 0) {
                html = `
                    <tr>
                        <td colspan="4" class="empty-state">
                            <i class="fa-regular fa-comments"></i>
                            <h5 class="fw-bold m-0">수신된 문의 내역이 없습니다.</h5>
                        </td>
                    </tr>
                `;
            } else {
                items.forEach(convo => {
                    const lastMsg = convo.lastMessage ? convo.lastMessage : '(내용 없음)';
                    const time = convo.lastMessageCreatedAt ? new Date(convo.lastMessageCreatedAt).toLocaleString('ko-KR', {
                        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                    }) : '-';

                    const link = `/inquiry?id=${convo.conversationId}&target=${convo.otherParticipantUsername}`;

                    html += `
                        <tr>
                            <td>
                                <div class="user-name">
                                    <i class="fa-solid fa-circle-user text-muted"></i> ${convo.otherParticipantNickname || '고객'}
                                </div>
                            </td>
                            <td class="text-start">
                                <div class="msg-preview">${lastMsg}</div>
                            </td>
                            <td class="time-text">${time}</td>
                            <td><a href="${link}" class="btn-reply">답변하기</a></td>
                        </tr>
                    `;
                });
            }
            listContainer.innerHTML = html;

            renderPagination(currentPage, totalPages);

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = `
                <tr>
                    <td colspan="4" class="empty-state text-danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <h5 class="fw-bold m-0">문의 내역을 불러오는데 실패했습니다.</h5>
                    </td>
                </tr>
            `;
        }
    }

    function renderPagination(currentPage, totalPages) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (totalPages <= 1) return;

        const displayPageCount = 5;
        let startPage = Math.floor(currentPage / displayPageCount) * displayPageCount;
        let endPage = startPage + displayPageCount - 1;
        if (endPage >= totalPages) endPage = totalPages - 1;

        const createPageItem = (text, targetPage, isCurrent = false, isDisabled = false) => {
            const li = document.createElement('li');
            li.className = `page-item ${isCurrent ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href = '#';
            a.innerHTML = text;
            if (!isDisabled) {
                a.onclick = (e) => {
                    e.preventDefault();
                    loadInquiries(targetPage);
                    window.scrollTo(0, 0);
                };
            }
            li.appendChild(a);
            container.appendChild(li);
        };

        createPageItem('<i class="fa-solid fa-angles-left"></i>', 0, false, currentPage === 0);
        createPageItem('<i class="fa-solid fa-angle-left"></i>', currentPage - 1, false, currentPage === 0);

        for (let i = startPage; i <= endPage; i++) {
            createPageItem(i + 1, i, i === currentPage);
        }

        createPageItem('<i class="fa-solid fa-angle-right"></i>', currentPage + 1, false, currentPage === totalPages - 1);
        createPageItem('<i class="fa-solid fa-angles-right"></i>', totalPages - 1, false, currentPage === totalPages - 1);
    }
</script>
</body>
</html>
