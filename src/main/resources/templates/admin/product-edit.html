<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 상품 수정</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .edit-container {
            max-width: 800px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .form-label {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            background-color: var(--input-bg);
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.1);
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-weight: 800;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 2rem;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,138,101,0.2);
        }

        .btn-cancel {
            background-color: white;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.2s;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background-color: var(--input-bg);
            color: var(--text-main);
        }

        .img-preview-container {
            margin-top: 1rem;
            text-align: center;
        }

        .img-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            display: none;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="edit-container">
    <div class="page-header">
        <i class="fa-solid fa-pen-to-square" style="font-size: 2rem; color: var(--primary-color);"></i>
        <h2>상품 정보 수정</h2>
    </div>

    <div class="form-card">
        <form id="edit-form">
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label">상품명</label>
                    <input type="text" id="name" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">정상가 (원)</label>
                    <input type="number" id="originalPrice" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">할인율 (%)</label>
                    <input type="number" id="discountRate" class="form-control" value="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">판매가 (원)</label>
                    <input type="number" id="salePrice" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">재고 수량</label>
                    <input type="number" id="stockQuantity" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">판매 상태</label>
                    <select id="status" class="form-select">
                        <option value="ON_SALE">판매중</option>
                        <option value="SOLD_OUT">품절</option>
                        <option value="HIDDEN">숨김</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">대상 견종</label>
                    <input type="text" id="targetBreed" class="form-control" placeholder="예: 전견종, 소형견 등">
                </div>
                <div class="col-md-6">
                    <label class="form-label">권장 사이즈</label>
                    <select id="recommendedSize" class="form-select">
                        <option value="">선택 안함</option>
                        <option value="SMALL">소형 (Small)</option>
                        <option value="MEDIUM">중형 (Medium)</option>
                        <option value="LARGE">대형 (Large)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">할인 시작 일시</label>
                    <input type="datetime-local" id="saleStartTime" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">할인 종료 일시</label>
                    <input type="datetime-local" id="saleEndTime" class="form-control">
                </div>

                <div class="col-md-12">
                    <label class="form-label">상품 설명</label>
                    <textarea id="description" class="form-control" rows="5"></textarea>
                </div>

                <div class="col-md-12">
                    <label class="form-label">썸네일 이미지 URL</label>
                    <input type="text" id="thumbnailUrl" class="form-control" placeholder="http://...">
                    <div class="img-preview-container">
                        <img id="img-preview" class="img-preview">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">수정 완료</button>
            <a href="/admin/products" class="btn-cancel">취소</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const productId = [[${productId}]];
    const token = localStorage.getItem('Authorization');

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch(`/api/shop/products/${productId}`, {
                headers: { 'Authorization': token }
            });

            if (!response.ok) throw new Error('데이터를 불러오지 못했습니다.');
            const product = await response.json();

            document.getElementById('name').value = product.name || '';
            document.getElementById('originalPrice').value = product.originalPrice || 0;
            document.getElementById('discountRate').value = product.discountRate || 0;
            document.getElementById('salePrice').value = product.salePrice || 0;
            document.getElementById('stockQuantity').value = product.stockQuantity || 0;

            if (product.status) document.getElementById('status').value = product.status;

            document.getElementById('targetBreed').value = product.targetBreed || '';
            if (product.recommendedSize) document.getElementById('recommendedSize').value = product.recommendedSize;

            if (product.saleStartTime) document.getElementById('saleStartTime').value = product.saleStartTime.substring(0, 16);
            if (product.saleEndTime) document.getElementById('saleEndTime').value = product.saleEndTime.substring(0, 16);

            document.getElementById('description').value = product.description || '';

            const thumbInput = document.getElementById('thumbnailUrl');
            const thumbPreview = document.getElementById('img-preview');
            thumbInput.value = product.thumbnailUrl || '';
            if (product.thumbnailUrl) {
                thumbPreview.src = product.thumbnailUrl;
                thumbPreview.style.display = 'inline-block';
            }

            thumbInput.addEventListener('input', (e) => {
                if(e.target.value) {
                    thumbPreview.src = e.target.value;
                    thumbPreview.style.display = 'inline-block';
                } else {
                    thumbPreview.style.display = 'none';
                }
            });

        } catch (error) {
            alert(error.message);
            window.location.href = '/admin/products';
        }
    });

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        let start = document.getElementById('saleStartTime').value;
        let end = document.getElementById('saleEndTime').value;
        if(start && start.length === 16) start += ':00';
        if(end && end.length === 16) end += ':00';

        let rSize = document.getElementById('recommendedSize').value;
        if(rSize === "") rSize = null;

        const requestData = {
            name: document.getElementById('name').value,
            originalPrice: parseInt(document.getElementById('originalPrice').value) || 0,
            discountRate: parseInt(document.getElementById('discountRate').value) || 0,
            salePrice: parseInt(document.getElementById('salePrice').value) || 0,
            stockQuantity: parseInt(document.getElementById('stockQuantity').value) || 0,
            status: document.getElementById('status').value,
            targetBreed: document.getElementById('targetBreed').value,
            recommendedSize: rSize,
            saleStartTime: start || null,
            saleEndTime: end || null,
            description: document.getElementById('description').value,
            thumbnailUrl: document.getElementById('thumbnailUrl').value
        };

        try {
            const response = await fetch(`/api/shop/products/${productId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(requestData)
            });

            if (response.ok) {
                alert('상품이 성공적으로 수정되었습니다.');
                window.location.href = '/admin/products';
            } else {
                const errText = await response.text();
                alert('수정 실패: ' + errText);
            }
        } catch (error) {
            alert('오류가 발생했습니다.');
        }
    });
</script>
</body>
</html>
