<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 관리자 주문 관리</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .admin-container {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background-color: white;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background-color: var(--input-bg);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bulk-actions {
            display: flex;
            gap: 8px;
        }

        .btn-bulk {
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            color: white;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-bulk:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-bulk-prep { background-color: #FFA726; }
        .btn-bulk-ship { background-color: #42A5F5; }
        .btn-bulk-comp { background-color: #78909C; }

        .filter-select {
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: white;
            cursor: pointer;
        }

        .filter-select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,138,101,0.1);
        }

        .table-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
        }

        .custom-table th {
            background-color: var(--input-bg);
            color: var(--text-sub);
            font-weight: 700;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .custom-table th:first-child { border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
        .custom-table th:last-child { border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

        .custom-table td {
            padding: 1rem;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 0.95rem;
        }

        .custom-table tbody tr:hover td {
            background-color: #FFFDFB;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .form-check-input {
            cursor: pointer;
            border-color: #CCC;
        }
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
        }

        .status-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: var(--input-bg);
            cursor: pointer;
            width: 100%;
        }

        .status-select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .pagination .page-link {
            border: none;
            border-radius: 10px;
            margin: 0 4px;
            color: var(--text-main);
            font-weight: 700;
            padding: 8px 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(255,138,101,0.3);
        }

        .pagination .page-item.disabled .page-link {
            background-color: transparent;
            color: #ccc;
            box-shadow: none;
            cursor: default;
        }

        .pagination .page-link:hover:not(.active):not(.disabled) {
            background-color: var(--input-bg);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-container">
    <div class="page-header">
        <h2 class="page-title">
            <i class="fa-solid fa-box-open" style="color: var(--primary-color);"></i> 전체 주문 관리
        </h2>
        <a href="/admin" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 대시보드로</a>
    </div>

    <div class="control-bar">
        <div class="bulk-actions">
            <button class="btn-bulk btn-bulk-prep" onclick="bulkUpdate('PREPARING')"><i class="fa-solid fa-box"></i> 선택 준비중</button>
            <button class="btn-bulk btn-bulk-ship" onclick="bulkUpdate('SHIPPING')"><i class="fa-solid fa-truck-fast"></i> 선택 배송시작</button>
            <button class="btn-bulk btn-bulk-comp" onclick="bulkUpdate('COMPLETED')"><i class="fa-solid fa-check-double"></i> 선택 배송완료</button>
        </div>
        <select id="filter-status" class="filter-select" onchange="filterOrders()">
            <option value="">모든 상태 보기</option>
            <option value="PENDING">결제대기</option>
            <option value="ORDER">결제완료</option>
            <option value="PREPARING">상품준비중</option>
            <option value="SHIPPING">배송중</option>
            <option value="COMPLETED">배송완료</option>
            <option value="CANCEL_REQUESTED">환불요청중</option>
            <option value="CANCEL">주문취소</option>
        </select>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="custom-table">
                <thead>
                <tr>
                    <th style="width: 50px;">
                        <input type="checkbox" id="check-all" class="form-check-input" onclick="toggleAll(this)">
                    </th>
                    <th style="width: 100px;">주문번호</th>
                    <th style="width: 160px;">주문일시</th>
                    <th style="width: 120px;">주문자</th>
                    <th class="text-start">상품명</th>
                    <th style="width: 120px;">결제금액</th>
                    <th style="width: 120px;">현재상태</th>
                    <th style="width: 140px;">상태변경</th>
                </tr>
                </thead>
                <tbody id="order-list">
                <tr>
                    <td colspan="8" class="empty-state">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 fw-bold">주문 데이터를 불러오는 중입니다...</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center flex-wrap mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('Authorization');
    const pageSize = 20;

    const StatusMap = {
        'PENDING': '결제대기',
        'ORDER': '결제완료',
        'PREPARING': '상품준비중',
        'SHIPPING': '배송중',
        'COMPLETED': '배송완료',
        'CANCEL_REQUESTED': '환불요청중',
        'CANCEL': '주문취소'
    };

    let currentPage = 0;
    let currentFilter = '';

    window.addEventListener('DOMContentLoaded', () => loadAllOrders(0));

    function filterOrders() {
        currentFilter = document.getElementById('filter-status').value;
        loadAllOrders(0);
    }

    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.order-check:not(:disabled)');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    async function loadAllOrders(page) {
        currentPage = page;
        const listContainer = document.getElementById('order-list');
        document.getElementById('check-all').checked = false;

        try {
            let url = `/admin/api/orders?page=${page}&size=${pageSize}`;
            if (currentFilter) url += `&status=${currentFilter}`;

            const response = await fetch(url, {
                headers: { 'Authorization': token }
            });

            if (!response.ok) {
                if(response.status === 401 || response.status === 403) {
                    alert('관리자 권한이 필요합니다.');
                    location.href = '/main';
                    return;
                }
                throw new Error('데이터 로드 실패');
            }

            const data = await response.json();
            const orders = data.content || data;

            let html = '';
            if(!orders || orders.length === 0) {
                html = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <i class="fa-solid fa-file-invoice"></i>
                            <h5 class="fw-bold m-0">해당하는 주문 내역이 없습니다.</h5>
                        </td>
                    </tr>
                `;
            } else {
                orders.forEach(order => {
                    const currentStatus = order.status || 'PENDING';
                    const isCanceled = currentStatus === 'CANCEL';
                    const orderDate = order.orderDate ? order.orderDate.replace('T', ' ').substring(0, 16) : '-';

                    let selectOptions = '';
                    Object.keys(StatusMap).forEach(key => {
                        const selected = currentStatus === key ? 'selected' : '';
                        const disabled = isCanceled && key !== 'CANCEL' ? 'disabled' : '';
                        selectOptions += `<option value="${key}" ${selected} ${disabled}>${StatusMap[key]}</option>`;
                    });

                    let badgeStyle = '';
                    if (currentStatus === 'CANCEL') badgeStyle = 'background-color: #FFF0F0; color: #D32F2F; border: 1px solid #FFCDD2;';
                    else if (currentStatus === 'CANCEL_REQUESTED') badgeStyle = 'background-color: #FFF8E1; color: #F57C00; border: 1px solid #FFE082;';
                    else if (currentStatus === 'ORDER') badgeStyle = 'background-color: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9;';
                    else if (currentStatus === 'PREPARING') badgeStyle = 'background-color: #FFF3E0; color: #E65100; border: 1px solid #FFE0B2;';
                    else if (currentStatus === 'SHIPPING') badgeStyle = 'background-color: #E3F2FD; color: #1565C0; border: 1px solid #BBDEFB;';
                    else badgeStyle = 'background-color: var(--input-bg); color: var(--text-sub); border: 1px solid var(--border-color);';

                    const rowOpacity = isCanceled ? 'opacity: 0.5;' : '';
                    const nameHtml = isCanceled ? `<del class="text-muted">${order.orderName}</del>` : order.orderName;

                    html += `
                        <tr style="${rowOpacity}">
                            <td>
                                <input type="checkbox" class="order-check form-check-input" value="${order.orderId}" ${isCanceled ? 'disabled' : ''}>
                            </td>
                            <td class="text-muted fw-bold">#${order.orderId}</td>
                            <td style="font-size: 0.85rem; color: #888;">${orderDate}</td>
                            <td class="fw-bold">${order.buyerName || '-'}</td>
                            <td class="text-start fw-bold text-truncate" style="max-width: 250px;">${nameHtml}</td>
                            <td class="fw-bold text-primary">${(order.totalPrice || 0).toLocaleString()}원</td>
                            <td><span class="status-badge" style="${badgeStyle}">${StatusMap[currentStatus]}</span></td>
                            <td>
                                <select class="status-select" onchange="changeStatus(${order.orderId}, this.value)" ${isCanceled ? 'disabled' : ''}>
                                    ${selectOptions}
                                </select>
                            </td>
                        </tr>
                    `;
                });
            }
            listContainer.innerHTML = html;
            if(data.totalPages !== undefined) renderPagination(data);

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = `
                <tr>
                    <td colspan="8" class="empty-state text-danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <h5 class="fw-bold m-0">데이터 로드 중 오류가 발생했습니다.</h5>
                    </td>
                </tr>
            `;
        }
    }

    function renderPagination(pageData) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (pageData.totalPages <= 1) return;

        const currentPage = pageData.number;
        const totalPages = pageData.totalPages;
        const displayPageCount = 5;

        let startPage = Math.floor(currentPage / displayPageCount) * displayPageCount;
        let endPage = startPage + displayPageCount - 1;
        if (endPage >= totalPages) endPage = totalPages - 1;

        const createPageItem = (text, targetPage, isCurrent = false, isDisabled = false) => {
            const li = document.createElement('li');
            li.className = `page-item ${isCurrent ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href = '#';
            a.innerHTML = text;
            if (!isDisabled) {
                a.onclick = (e) => {
                    e.preventDefault();
                    loadAllOrders(targetPage);
                    window.scrollTo(0, 0);
                };
            }
            li.appendChild(a);
            container.appendChild(li);
        };

        createPageItem('<i class="fa-solid fa-angles-left"></i>', 0, false, currentPage === 0);
        createPageItem('<i class="fa-solid fa-angle-left"></i>', currentPage - 1, false, currentPage === 0);

        for (let i = startPage; i <= endPage; i++) {
            createPageItem(i + 1, i, i === currentPage);
        }

        createPageItem('<i class="fa-solid fa-angle-right"></i>', currentPage + 1, false, currentPage === totalPages - 1);
        createPageItem('<i class="fa-solid fa-angles-right"></i>', totalPages - 1, false, currentPage === totalPages - 1);
    }

    async function changeStatus(orderId, newStatus) {
        if (!confirm(`주문 상태를 [${StatusMap[newStatus]}]로 변경하시겠습니까?`)) {
            loadAllOrders(currentPage);
            return;
        }

        try {
            const response = await fetch(`/admin/api/orders/${orderId}/status?status=${newStatus}`, {
                method: 'PATCH',
                headers: { 'Authorization': token }
            });

            if (response.ok) {
                alert('상태가 변경되었습니다.');
                loadAllOrders(currentPage);
            } else {
                alert('상태 변경 실패');
                loadAllOrders(currentPage);
            }
        } catch (error) {
            alert('서버 통신 오류');
            loadAllOrders(currentPage);
        }
    }

    async function bulkUpdate(newStatus) {
        const checkboxes = document.querySelectorAll('.order-check:checked:not(:disabled)');

        if (checkboxes.length === 0) {
            alert("변경할 주문을 선택해주세요. (취소된 주문은 선택 불가)");
            return;
        }

        const orderIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
        const statusName = StatusMap[newStatus];

        if (!confirm(`선택한 ${orderIds.length}건을 [${statusName}] 상태로 변경하시겠습니까?`)) return;

        try {
            const response = await fetch('/admin/api/orders/bulk-status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({
                    orderIds: orderIds,
                    status: newStatus
                })
            });

            if (response.ok) {
                const msg = await response.text();
                alert(msg);
                loadAllOrders(currentPage);
            } else {
                const errorMsg = await response.text();
                alert("일괄 변경 실패: " + errorMsg);
            }
        } catch (error) {
            console.error(error);
            alert("서버 통신 오류");
        }
    }
</script>
</body>
</html>
