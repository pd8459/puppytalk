<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 회원 관리</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .admin-container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background-color: white;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background-color: var(--input-bg);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .table-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
        }

        .custom-table th {
            background-color: var(--input-bg);
            color: var(--text-sub);
            font-weight: 700;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .custom-table th:first-child { border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
        .custom-table th:last-child { border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

        .custom-table td {
            padding: 1rem;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 0.95rem;
        }

        .custom-table tbody tr:hover td {
            background-color: #FFFDFB;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
        }

        .status-active {
            background-color: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
        }

        .status-banned {
            background-color: #FFF0F0;
            color: #D32F2F;
            border: 1px solid #FFCDD2;
        }

        .btn-action {
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-ban {
            background-color: white;
            color: #D32F2F;
            border-color: #FFCDD2;
        }

        .btn-ban:hover {
            background-color: #FFF0F0;
        }

        .btn-activate {
            background-color: white;
            color: #2E7D32;
            border-color: #C8E6C9;
        }

        .btn-activate:hover {
            background-color: #E8F5E9;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .pagination .page-link {
            border: none;
            border-radius: 10px;
            margin: 0 4px;
            color: var(--text-main);
            font-weight: 700;
            padding: 8px 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(255,138,101,0.3);
        }

        .pagination .page-item.disabled .page-link {
            background-color: transparent;
            color: #ccc;
            box-shadow: none;
            cursor: default;
        }

        .pagination .page-link:hover:not(.active):not(.disabled) {
            background-color: var(--input-bg);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-container">
    <div class="page-header">
        <h2 class="page-title">
            <i class="fa-solid fa-users" style="color: var(--primary-color);"></i> 회원 관리
        </h2>
        <a href="/admin" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 대시보드로</a>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="custom-table">
                <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th style="width: 150px;">닉네임</th>
                    <th class="text-start">아이디 (Email)</th>
                    <th style="width: 100px;">권한</th>
                    <th style="width: 150px;">가입일</th>
                    <th style="width: 120px;">상태</th>
                    <th style="width: 100px;">관리</th>
                </tr>
                </thead>
                <tbody id="user-list">
                <tr>
                    <td colspan="7" class="empty-state">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 fw-bold">회원 목록을 불러오는 중입니다...</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center flex-wrap mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('Authorization');
    const pageSize = 20;

    window.addEventListener('DOMContentLoaded', () => loadUsers(0));

    async function loadUsers(page) {
        const listContainer = document.getElementById('user-list');

        try {
            const response = await fetch(`/admin/api/users?page=${page}&size=${pageSize}`, {
                headers: { 'Authorization': token }
            });

            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    alert('관리자 권한이 없습니다.');
                    location.href = '/main';
                    return;
                }
                throw new Error('데이터 로드 실패');
            }

            const data = await response.json();
            const users = data.content || data;

            let html = '';
            if (!users || users.length === 0) {
                html = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fa-solid fa-user-xmark"></i>
                            <h5 class="fw-bold m-0">가입된 회원이 없습니다.</h5>
                        </td>
                    </tr>
                `;
            } else {
                users.forEach(user => {
                    const isBanned = user.status !== 'ACTIVE';
                    const statusClass = isBanned ? 'status-banned' : 'status-active';
                    const statusText = isBanned ? '정지됨' : '활동중';
                    const statusBadge = `<span class="status-badge ${statusClass}">${statusText}</span>`;

                    let actionBtn = '-';
                    if (user.role !== 'ADMIN') {
                        if (isBanned) {
                            actionBtn = `<button class="btn-action btn-activate" onclick="changeStatus(${user.id}, 'ACTIVE')">해제</button>`;
                        } else {
                            actionBtn = `<button class="btn-action btn-ban" onclick="changeStatus(${user.id}, 'BANNED')">정지</button>`;
                        }
                    }

                    const joinDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('ko-KR') : '-';
                    const rowOpacity = isBanned ? 'opacity: 0.6;' : '';

                    html += `
                        <tr style="${rowOpacity}">
                            <td class="text-muted fw-bold">#${user.id}</td>
                            <td class="fw-bold">${user.nickname}</td>
                            <td class="text-start">${user.username}</td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary border">${user.role}</span></td>
                            <td>${joinDate}</td>
                            <td>${statusBadge}</td>
                            <td>${actionBtn}</td>
                        </tr>
                    `;
                });
            }

            listContainer.innerHTML = html;
            if(data.totalPages !== undefined) renderPagination(data);

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state text-danger">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <h5 class="fw-bold m-0">회원 목록을 불러오는데 실패했습니다.</h5>
                    </td>
                </tr>
            `;
        }
    }

    function renderPagination(pageData) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (pageData.totalPages <= 1) return;

        const currentPage = pageData.number;
        const totalPages = pageData.totalPages;
        const displayPageCount = 5;

        let startPage = Math.floor(currentPage / displayPageCount) * displayPageCount;
        let endPage = startPage + displayPageCount - 1;
        if (endPage >= totalPages) endPage = totalPages - 1;

        const createPageItem = (text, targetPage, isCurrent = false, isDisabled = false) => {
            const li = document.createElement('li');
            li.className = `page-item ${isCurrent ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href = '#';
            a.innerHTML = text;
            if (!isDisabled) {
                a.onclick = (e) => {
                    e.preventDefault();
                    loadUsers(targetPage);
                    window.scrollTo(0, 0);
                };
            }
            li.appendChild(a);
            container.appendChild(li);
        };

        createPageItem('<i class="fa-solid fa-angles-left"></i>', 0, false, currentPage === 0);
        createPageItem('<i class="fa-solid fa-angle-left"></i>', currentPage - 1, false, currentPage === 0);

        for (let i = startPage; i <= endPage; i++) {
            createPageItem(i + 1, i, i === currentPage);
        }

        createPageItem('<i class="fa-solid fa-angle-right"></i>', currentPage + 1, false, currentPage === totalPages - 1);
        createPageItem('<i class="fa-solid fa-angles-right"></i>', totalPages - 1, false, currentPage === totalPages - 1);
    }

    async function changeStatus(userId, newStatus) {
        const actionText = newStatus === 'BANNED' ? '정지' : '정지 해제';
        if (!confirm(`해당 회원을 ${actionText} 하시겠습니까?`)) return;

        try {
            const response = await fetch(`/admin/api/users/${userId}/status?status=${newStatus}`, {
                method: 'PATCH',
                headers: { 'Authorization': token }
            });

            if (response.ok) {
                alert(`성공적으로 ${actionText} 처리되었습니다.`);
                loadUsers(0);
            } else {
                alert('처리에 실패했습니다.');
            }
        } catch (e) {
            alert('오류가 발생했습니다.');
        }
    }
</script>
</body>
</html>
