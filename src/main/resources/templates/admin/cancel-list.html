<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 취소/환불 관리</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #222222;
            --text-sub: #777777;
            --border-color: #EBEBEB;
            --input-bg: #F8F9FA;
            --danger-color: #EF5350;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .admin-container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-weight: 800;
            color: var(--danger-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background-color: white;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background-color: var(--input-bg);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .alert-custom {
            background-color: #FFF8E1;
            border: 1px solid #FFE082;
            color: #F57C00;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(245, 124, 0, 0.05);
        }

        .alert-custom i {
            font-size: 1.4rem;
        }

        .alert-custom strong {
            color: #E65100;
            font-weight: 800;
        }

        .table-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #FFCDD2;
            box-shadow: 0 10px 30px rgba(239, 83, 80, 0.05);
            overflow: hidden;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 0;
        }

        .custom-table th {
            background-color: #FFF0F0;
            color: #D32F2F;
            font-weight: 800;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #FFCDD2;
            white-space: nowrap;
        }

        .custom-table th:first-child { border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
        .custom-table th:last-child { border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

        .custom-table td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 0.95rem;
        }

        .custom-table tbody tr:hover td {
            background-color: #FFFDFB;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            background-color: #FFF3E0;
            color: #E65100;
            border: 1px solid #FFE0B2;
            display: inline-block;
        }

        .btn-approve {
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-approve:hover {
            background-color: #D32F2F;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.2);
            color: white;
        }

        .empty-state {
            padding: 5rem 2rem;
            text-align: center;
            color: var(--text-sub);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
            color: #4CAF50;
        }

        .pagination .page-link {
            border: none;
            border-radius: 10px;
            margin: 0 4px;
            color: var(--text-main);
            font-weight: 700;
            padding: 8px 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--danger-color) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(239, 83, 80, 0.3);
        }

        .pagination .page-item.disabled .page-link {
            background-color: transparent;
            color: #ccc;
            box-shadow: none;
            cursor: default;
        }

        .pagination .page-link:hover:not(.active):not(.disabled) {
            background-color: #FFF0F0;
            color: var(--danger-color);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-container">
    <div class="page-header">
        <h2 class="page-title">
            <i class="fa-solid fa-triangle-exclamation"></i> 취소/환불 요청 관리
        </h2>
        <a href="/admin" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 대시보드로</a>
    </div>

    <div class="alert-custom">
        <i class="fa-solid fa-circle-info"></i>
        <div>
            이곳은 고객이 <strong>취소를 요청한 주문</strong>만 표시됩니다. 승인 시 결제가 취소되며 <strong>재고가 자동으로 복구</strong>됩니다.
        </div>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="custom-table">
                <thead>
                <tr>
                    <th style="width: 100px;">주문번호</th>
                    <th style="width: 160px;">요청일시</th>
                    <th style="width: 120px;">주문자</th>
                    <th class="text-start">환불상품</th>
                    <th style="width: 130px;">환불예정금액</th>
                    <th style="width: 120px;">상태</th>
                    <th style="width: 140px;">처리</th>
                </tr>
                </thead>
                <tbody id="cancel-list">
                <tr>
                    <td colspan="7" class="empty-state">
                        <div class="spinner-border text-danger" role="status"></div>
                        <p class="mt-3 fw-bold text-danger">요청 내역을 불러오는 중입니다...</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center flex-wrap mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('Authorization');
    const pageSize = 20;
    let currentPage = 0;

    window.addEventListener('DOMContentLoaded', () => loadCancelRequests(0));

    async function loadCancelRequests(page) {
        currentPage = page;
        const listContainer = document.getElementById('cancel-list');

        try {
            const response = await fetch(`/admin/api/cancels?page=${page}&size=${pageSize}`, {
                headers: { 'Authorization': token }
            });

            if (!response.ok) {
                if(response.status === 401 || response.status === 403) {
                    alert('관리자 권한이 필요합니다.');
                    location.href = '/main';
                    return;
                }
                throw new Error('데이터 로드 실패');
            }

            const data = await response.json();
            const orders = data.content || data;

            let html = '';
            if (!orders || orders.length === 0) {
                html = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fa-solid fa-face-smile-wink text-success"></i>
                            <h5 class="fw-bold m-0" style="color: #2E7D32;">현재 들어온 취소/환불 요청이 없습니다! 🎉</h5>
                        </td>
                    </tr>
                `;
            } else {
                orders.forEach(order => {
                    const orderDate = order.orderDate ? order.orderDate.replace('T', ' ').substring(0, 16) : '-';
                    const itemName = order.orderName || '상품 정보 없음';
                    const price = order.totalPrice ? order.totalPrice.toLocaleString() : '0';

                    html += `
                        <tr>
                            <td class="fw-bold text-muted">#${order.orderId}</td>
                            <td style="font-size: 0.85rem; color: #888;">${orderDate}</td>
                            <td class="fw-bold">${order.buyerName || '-'}</td>
                            <td class="text-start fw-bold text-truncate" style="max-width: 250px;">${itemName}</td>
                            <td class="fw-bold" style="color: var(--danger-color);">${price}원</td>
                            <td><span class="status-badge">취소요청중</span></td>
                            <td>
                                <button class="btn-approve" onclick="approveCancel(${order.orderId})">
                                    <i class="fa-solid fa-check"></i> 환불 승인
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            listContainer.innerHTML = html;
            if (data.totalPages !== undefined) renderPagination(data);

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state text-danger">
                        <i class="fa-solid fa-triangle-exclamation text-danger"></i>
                        <h5 class="fw-bold m-0 text-danger">데이터 로드 중 오류가 발생했습니다.</h5>
                    </td>
                </tr>
            `;
        }
    }

    function renderPagination(pageData) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (pageData.totalPages <= 1) return;

        const totalPages = pageData.totalPages;
        const displayPageCount = 5;

        let startPage = Math.floor(currentPage / displayPageCount) * displayPageCount;
        let endPage = startPage + displayPageCount - 1;
        if (endPage >= totalPages) endPage = totalPages - 1;

        const createPageItem = (text, targetPage, isCurrent = false, isDisabled = false) => {
            const li = document.createElement('li');
            li.className = `page-item ${isCurrent ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;
            const a = document.createElement('a');
            a.className = 'page-link';
            a.href = '#';
            a.innerHTML = text;
            if (!isDisabled) {
                a.onclick = (e) => {
                    e.preventDefault();
                    loadCancelRequests(targetPage);
                    window.scrollTo(0, 0);
                };
            }
            li.appendChild(a);
            container.appendChild(li);
        };

        createPageItem('<i class="fa-solid fa-angles-left"></i>', 0, false, currentPage === 0);
        createPageItem('<i class="fa-solid fa-angle-left"></i>', currentPage - 1, false, currentPage === 0);

        for (let i = startPage; i <= endPage; i++) {
            createPageItem(i + 1, i, i === currentPage);
        }

        createPageItem('<i class="fa-solid fa-angle-right"></i>', currentPage + 1, false, currentPage === totalPages - 1);
        createPageItem('<i class="fa-solid fa-angles-right"></i>', totalPages - 1, false, currentPage === totalPages - 1);
    }

    async function approveCancel(orderId) {
        if (!confirm('정말 환불 처리하시겠습니까?\\n(승인 시 결제가 취소되고 재고가 복구됩니다)')) return;

        try {
            const response = await fetch(`/admin/api/cancels/${orderId}/approve`, {
                method: 'POST',
                headers: { 'Authorization': token }
            });

            if (response.ok) {
                alert('환불이 완료되고 재고가 정상 복구되었습니다.');
                loadCancelRequests(currentPage);
            } else {
                alert('처리 실패: 서버 오류가 발생했습니다.');
            }
        } catch (error) {
            alert('오류 발생: 네트워크 상태를 확인해주세요.');
        }
    }
</script>
</body>
</html>
