<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 쪽지</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
            --chat-bg: #FFF3EB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 3rem;
        }

        .chat-wrapper {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 75vh;
            min-height: 500px;
        }

        .chat-header {
            background-color: white;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .btn-back {
            color: var(--text-main);
            font-size: 1.2rem;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .btn-back:hover {
            color: var(--primary-color);
        }

        .header-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
        }

        .chat-body {
            flex-grow: 1;
            background-color: var(--chat-bg);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            max-width: 100%;
        }

        .message.incoming {
            flex-direction: row;
        }

        .message.outgoing {
            flex-direction: row-reverse;
        }

        .profile-img {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            background-color: white;
            flex-shrink: 0;
        }

        .message.incoming .profile-img {
            margin-right: 0.8rem;
        }

        .message.outgoing .profile-img {
            display: none;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message.outgoing .msg-content-wrapper {
            align-items: flex-end;
        }

        .sender-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            margin-left: 0.2rem;
        }

        .message.outgoing .sender-name {
            display: none;
        }

        .bubble-group {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .message.outgoing .bubble-group {
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .bubble-incoming {
            background-color: white;
            color: var(--text-main);
            border-radius: 4px 18px 18px 18px;
            border: 1px solid var(--border-color);
        }

        .bubble-outgoing {
            background-color: var(--primary-color);
            color: white;
            border-radius: 18px 4px 18px 18px;
        }

        .msg-time {
            font-size: 0.75rem;
            color: #A0A0A0;
            white-space: nowrap;
            margin-bottom: 0.2rem;
        }

        .chat-footer {
            background-color: white;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input {
            flex-grow: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
            background-color: white;
        }

        .btn-send {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-sub);
        }

        .empty-chat i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="chat-wrapper">
        <div class="chat-header">
            <a href="/messages" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
            <h3 id="conversation-header" class="header-title">대화방</h3>
        </div>

        <div id="chat-box" class="chat-body">
            <div class="empty-chat">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>

        <form id="reply-form" class="chat-footer">
            <input type="text" id="reply-content" class="chat-input" placeholder="따뜻한 메시지를 입력해보세요" required autocomplete="off">
            <button class="btn-send" type="submit"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const conversationId = new URLSearchParams(window.location.search).get('id');
    const chatBox = document.getElementById('chat-box');
    const header = document.getElementById('conversation-header');
    const replyForm = document.getElementById('reply-form');
    const replyContent = document.getElementById('reply-content');

    const token = localStorage.getItem('Authorization');

    let otherUserUsername = '';
    let currentUserProfileImg = '/images/default_profile.png';
    let otherUserProfileImg = '/images/default_profile.png';
    let currentUsername = '';

    window.addEventListener('DOMContentLoaded', async () => {
        if (!conversationId) {
            alert('잘못된 접근입니다.');
            window.location.href = '/main';
            return;
        }
        await loadMessages();
    });

    async function loadMessages() {
        try {
            const [messagesResponse, profileResponse] = await Promise.all([
                fetch(`/api/messages/${conversationId}`, {
                    headers: { 'Authorization': token }
                }),
                fetch('/api/profile', {
                    headers: { 'Authorization': token }
                })
            ]);

            if (!messagesResponse.ok) {
                if (messagesResponse.status === 401 || messagesResponse.status === 403) {
                    alert('로그인이 필요하거나 이 대화방에 접근할 권한이 없습니다.');
                    window.location.href = '/messages';
                    return;
                }
                throw new Error('메시지를 불러오지 못했습니다.');
            }

            const messages = await messagesResponse.json();

            if (profileResponse.ok) {
                const profile = await profileResponse.json();
                currentUsername = profile.username;
                if(profile.profileImageUrl) currentUserProfileImg = profile.profileImageUrl;
            }

            chatBox.innerHTML = '';

            if (messages.length > 0) {
                const firstMessage = messages[0];
                if (firstMessage.senderUsername === currentUsername) {
                    header.textContent = `${firstMessage.receiverNickname}`;
                    otherUserUsername = firstMessage.receiverUsername;
                    if(firstMessage.receiverProfileImageUrl) otherUserProfileImg = firstMessage.receiverProfileImageUrl;
                } else {
                    header.textContent = `${firstMessage.senderNickname}`;
                    otherUserUsername = firstMessage.senderUsername;
                    if(firstMessage.senderProfileImageUrl) otherUserProfileImg = firstMessage.senderProfileImageUrl;
                }

                messages.forEach(msg => {
                    const isSentByMe = msg.senderUsername === currentUsername;
                    const messageWrapper = document.createElement('div');
                    messageWrapper.className = `message ${isSentByMe ? 'outgoing' : 'incoming'}`;

                    const timeString = new Date(msg.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

                    let html = '';
                    if (isSentByMe) {
                        html = `
                            <div class="msg-content-wrapper">
                                <div class="bubble-group">
                                    <div class="bubble bubble-outgoing">${msg.content}</div>
                                    <div class="msg-time">${timeString}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        html = `
                            <img src="${otherUserProfileImg}" class="profile-img" onerror="this.src='/images/default_profile.png'">
                            <div class="msg-content-wrapper">
                                <div class="sender-name">${msg.senderNickname}</div>
                                <div class="bubble-group">
                                    <div class="bubble bubble-incoming">${msg.content}</div>
                                    <div class="msg-time">${timeString}</div>
                                </div>
                            </div>
                        `;
                    }
                    messageWrapper.innerHTML = html;
                    chatBox.appendChild(messageWrapper);
                });
            } else {
                header.textContent = '대화방';
                chatBox.innerHTML = `
                    <div class="empty-chat">
                        <i class="fa-regular fa-comments"></i>
                        <p>아직 대화 내용이 없습니다.</p>
                    </div>
                `;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error(error);
            chatBox.innerHTML = `
                <div class="empty-chat text-danger">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <p>오류가 발생했습니다.</p>
                </div>
            `;
        }
    }

    replyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const content = replyContent.value;
        if (!content.trim() || !otherUserUsername) return;

        try {
            const response = await fetch(`/api/messages/${otherUserUsername}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({ content: content })
            });
            if (response.ok) {
                replyContent.value = '';
                await loadMessages();
            } else {
                alert('메시지 전송에 실패했습니다.');
            }
        } catch (error) {
            alert('메시지 전송 중 오류가 발생했습니다.');
        }
    });
</script>
</body>
</html>
