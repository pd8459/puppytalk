<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 우리 동네 동물병원</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .map-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 15px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .map-wrapper {
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            height: 600px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .sidebar-wrapper {
            background-color: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
            width: 100%;
        }

        .custom-input {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            background-color: var(--input-bg);
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
            background-color: white;
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 1.2rem;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-custom:hover {
            background-color: var(--primary-hover);
            color: white;
        }

        .btn-find-me {
            background-color: white;
            color: #4CAF50;
            border: 2px solid #4CAF50;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .btn-find-me:hover {
            background-color: #4CAF50;
            color: white;
        }

        .hospital-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin: 0;
            list-style: none;
        }

        .hospital-list::-webkit-scrollbar {
            width: 6px;
        }

        .hospital-list::-webkit-scrollbar-thumb {
            background-color: #DDDDDD;
            border-radius: 10px;
        }

        .custom-list-item {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
        }

        .custom-list-item:hover {
            border-color: var(--primary-color);
            background-color: var(--bg-color);
            transform: translateY(-2px);
        }

        .custom-list-item h6 {
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 0.3rem;
            font-size: 1.05rem;
        }

        .custom-list-item p {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            color: var(--text-sub);
            padding: 2rem 0;
            font-weight: 600;
        }
    </style>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3e76fe79c83a7419b49f04db157ee82b&libraries=services"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="map-container">
    <div class="page-header">
        <h2>🏥 우리 동네 동물병원 찾기</h2>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="map-wrapper">
                <div id="map"></div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="sidebar-wrapper">
                <button id="find-me-btn" class="btn-find-me">📍 내 위치 중심으로 보기</button>

                <div class="search-box">
                    <input type="text" id="search-keyword" class="custom-input" placeholder="지역 또는 병원 이름 검색">
                    <button id="search-btn" class="btn-custom">검색</button>
                </div>

                <div id="hospital-list" class="hospital-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const scriptCheck = setInterval(() => {
            if (typeof kakao !== 'undefined' && kakao.maps) {
                clearInterval(scriptCheck);
                kakao.maps.load(async () => {
                    try {
                        const allHospitals = await fetchHospitals();
                        if (allHospitals) {
                            initializeMap(allHospitals);
                        }
                    } catch (error) {
                        console.error("데이터 로드 실패:", error);
                    }
                });
            }
        }, 100);

        setTimeout(() => {
            clearInterval(scriptCheck);
            if (typeof kakao === 'undefined') {
                document.getElementById('map').innerHTML =
                    '<div class="empty-state text-danger mt-5">지도 라이브러리를 불러오지 못했습니다. <br>인터넷 연결이나 API 키를 확인해주세요.</div>';
            }
        }, 5000);
    });

    async function fetchHospitals(keyword = '') {
        const url = keyword ? `/api/hospitals/search?keyword=${keyword}` : '/api/hospitals';
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('동물병원 정보를 불러오지 못했습니다.');
            return await response.json();
        } catch (error) {
            console.error(error);
            document.getElementById('map').innerHTML = `<div class="empty-state text-danger mt-5">${error.message}</div>`;
            return null;
        }
    }

    function initializeMap(initialHospitals) {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
        const map = new kakao.maps.Map(mapContainer, { center: defaultPosition, level: 7 });

        let currentInfoWindow = null;
        let currentSelectedMarker = null;
        const markers = [];
        let userMarker = null;

        const zoomControl = new kakao.maps.ZoomControl();
        map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

        const defaultMarkerImage = new kakao.maps.MarkerImage(
            'http://t1.daumcdn.net/mapjsapi/images/marker.png',
            new kakao.maps.Size(29, 42)
        );
        const selectedMarkerImage = new kakao.maps.MarkerImage(
            'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
            new kakao.maps.Size(32, 32)
        );

        function moveToUserLocation(isInitialLoad = false) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const userPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    map.setLevel(5, { animate: true });
                    map.panTo(userPosition);

                    if (!userMarker) {
                        const markerImage = new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png', new kakao.maps.Size(24, 35));
                        userMarker = new kakao.maps.Marker({ map: map, position: userPosition, title: '내 위치', image: markerImage });
                    } else {
                        userMarker.setPosition(userPosition);
                    }
                }, () => {
                    if(!isInitialLoad) alert('위치 정보를 가져오는 데 실패했습니다.');
                });
            } else {
                if(!isInitialLoad) alert('이 브라우저에서는 위치 정보 기능을 지원하지 않습니다.');
            }
        }

        setTimeout(() => {
            moveToUserLocation(true);
        }, 500);

        function displayMarkersAndList(hospitals) {
            const listContainer = document.getElementById('hospital-list');
            listContainer.innerHTML = '';
            markers.forEach(marker => marker.setMap(null));
            markers.length = 0;

            if (!hospitals || hospitals.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">검색 결과가 없습니다. 🐾</div>';
                return;
            }

            hospitals.forEach(h => {
                if (!h.latitude || !h.longitude) return;
                const position = new kakao.maps.LatLng(h.latitude, h.longitude);
                const marker = new kakao.maps.Marker({
                    position: position,
                    title: h.name,
                    image: defaultMarkerImage
                });

                marker.setMap(map);
                markers.push(marker);

                const infowindow = new kakao.maps.InfoWindow({
                    content: `<div style="padding:15px; width:280px; border-radius:12px; border:none;">
                                <strong style="color:#FF8A65; font-size:1.1em; display:block; margin-bottom:5px;">${h.name}</strong>
                                <span style="font-size:0.85em; color:#555; display:block; margin-bottom:5px;">${h.address || ''}</span>
                                <hr style="margin:8px 0; border-top:1px solid #eee;">
                                <div style="font-size:0.85em; color:#666;">
                                    <strong>⏰ 운영:</strong> ${h.operatingHours || '정보 없음'}<br>
                                    <strong>📞 연락처:</strong> ${h.contact || '정보 없음'}
                                </div>
                              </div>`,
                    removable: true
                });

                const selectMarker = () => {
                    if (currentSelectedMarker) {
                        currentSelectedMarker.setImage(defaultMarkerImage);
                    }
                    marker.setImage(selectedMarkerImage);
                    currentSelectedMarker = marker;
                    if (currentInfoWindow) currentInfoWindow.close();
                    infowindow.open(map, marker);
                    currentInfoWindow = infowindow;
                };

                kakao.maps.event.addListener(marker, 'click', selectMarker);

                const listItem = document.createElement('a');
                listItem.href = '#';
                listItem.className = 'custom-list-item';
                listItem.innerHTML = `<h6>${h.name}</h6><p>${h.address || ''}</p>`;
                listItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    map.setLevel(4, { animate: true });
                    map.panTo(position);
                    selectMarker();
                });

                listContainer.appendChild(listItem);
            });

            if (markers.length > 0) {
                const bounds = new kakao.maps.LatLngBounds();
                markers.forEach(marker => bounds.extend(marker.getPosition()));
                map.setBounds(bounds);
            }
        }

        document.getElementById('search-btn').addEventListener('click', async () => {
            const keyword = document.getElementById('search-keyword').value;
            const searchResult = await fetchHospitals(keyword);
            if (searchResult) displayMarkersAndList(searchResult);
        });

        document.getElementById('search-keyword').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });

        document.getElementById('find-me-btn').addEventListener('click', () => {
            moveToUserLocation(false);
        });

        displayMarkersAndList(initialHospitals);
    }
</script>
</body>
</html>
