<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 상품 문의</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
            --chat-bg: #FFF3EB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 3rem;
        }

        .chat-wrapper {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 75vh;
            min-height: 500px;
        }

        .chat-header {
            background-color: white;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .btn-back {
            color: var(--text-main);
            font-size: 1.2rem;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .btn-back:hover {
            color: var(--primary-color);
        }

        .header-title {
            font-weight: 800;
            font-size: 1.1rem;
            margin: 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-body {
            flex-grow: 1;
            background-color: var(--chat-bg);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            max-width: 100%;
        }

        .message.incoming {
            flex-direction: row;
        }

        .message.outgoing {
            flex-direction: row-reverse;
        }

        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message.outgoing .msg-content-wrapper {
            align-items: flex-end;
        }

        .sender-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 0.3rem;
            margin-left: 0.2rem;
        }

        .message.outgoing .sender-name {
            display: none;
        }

        .bubble-group {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .message.outgoing .bubble-group {
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .bubble-incoming {
            background-color: white;
            color: var(--text-main);
            border-radius: 18px 18px 18px 4px;
            border: 1px solid var(--border-color);
        }

        .bubble-outgoing {
            background-color: var(--primary-color);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .msg-time {
            font-size: 0.75rem;
            color: #A0A0A0;
            white-space: nowrap;
            margin-bottom: 0.2rem;
        }

        .chat-footer {
            background-color: white;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input {
            flex-grow: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
            background-color: white;
        }

        .btn-send {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="chat-wrapper">
        <div class="chat-header">
            <a href="/shop/list" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
            <h3 id="chat-title" class="header-title"><i class="fa-solid fa-store" style="color: var(--primary-color);"></i> 연결 중...</h3>
        </div>

        <div id="chat-box" class="chat-body"></div>

        <form id="reply-form" class="chat-footer">
            <input type="text" id="reply-content" class="chat-input" placeholder="궁금한 점을 판매자에게 물어보세요" required autocomplete="off">
            <button class="btn-send" type="submit"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const conversationId = [[${conversationId}]];
    const urlParams = new URLSearchParams(window.location.search);
    let targetFromUrl = urlParams.get('target');

    let stompClient = null;
    let currentUsername = '';
    let otherUserUsername = '';
    const token = localStorage.getItem('Authorization');

    window.addEventListener('DOMContentLoaded', async () => {
        await getMyProfile();
        await loadMessages();
        connectWebSocket();
    });

    async function getMyProfile() {
        try {
            const res = await fetch('/api/profile', {
                headers: { 'Authorization': token }
            });
            if(res.ok) {
                const user = await res.json();
                currentUsername = user.username;
            }
        } catch(e) {}
    }

    async function loadMessages() {
        try {
            const res = await fetch(`/api/messages/${conversationId}`, {
                headers: { 'Authorization': token }
            });
            if(!res.ok) return;
            const messages = await res.json();
            const headerTitle = document.getElementById('chat-title');

            if(messages.length > 0) {
                const first = messages[0];
                if(first.senderUsername === currentUsername) {
                    otherUserUsername = first.receiverUsername;
                    headerTitle.innerHTML = `<i class="fa-solid fa-store" style="color: var(--primary-color);"></i> ${first.receiverNickname}`;
                } else {
                    otherUserUsername = first.senderUsername;
                    headerTitle.innerHTML = `<i class="fa-solid fa-store" style="color: var(--primary-color);"></i> ${first.senderNickname}`;
                }
            } else {
                if(targetFromUrl) {
                    otherUserUsername = targetFromUrl;
                    headerTitle.innerHTML = `<i class="fa-solid fa-store" style="color: var(--primary-color);"></i> 판매자 문의`;
                } else {
                    otherUserUsername = "1111";
                    headerTitle.innerHTML = `<i class="fa-solid fa-store" style="color: var(--primary-color);"></i> 퍼피톡 고객센터`;
                }
            }

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            messages.forEach(msg => appendMessage(msg));
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    function connectWebSocket() {
        const socket = new SockJS('/ws-stomp');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({'Authorization': token}, function() {
            stompClient.subscribe(`/topic/chat/${conversationId}`, function(msg) {
                appendMessage(JSON.parse(msg.body));
                const chatBox = document.getElementById('chat-box');
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        });
    }

    function appendMessage(msg) {
        const isMe = msg.senderUsername === currentUsername;
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${isMe ? 'outgoing' : 'incoming'}`;

        const timeString = msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

        if (isMe) {
            div.innerHTML = `
                <div class="msg-content-wrapper">
                    <div class="bubble-group">
                        <div class="bubble bubble-outgoing">${msg.content}</div>
                        <div class="msg-time">${timeString}</div>
                    </div>
                </div>
            `;
        } else {
            div.innerHTML = `
                <div class="msg-content-wrapper">
                    <div class="sender-name">${msg.senderNickname || '판매자'}</div>
                    <div class="bubble-group">
                        <div class="bubble bubble-incoming">${msg.content}</div>
                        <div class="msg-time">${timeString}</div>
                    </div>
                </div>
            `;
        }
        chatBox.appendChild(div);
    }

    document.getElementById('reply-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('reply-content');
        if(!input.value.trim()) return;

        try {
            await fetch(`/api/messages/${otherUserUsername}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({content: input.value})
            });
            input.value = '';
        } catch(e) {
            alert('전송 실패');
        }
    });
</script>
</body>
</html>
