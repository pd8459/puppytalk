<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 반려견 놀이터 지도</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .map-container {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 0 15px;
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
        }

        .map-wrapper {
            background-color: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            height: 650px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .sidebar-wrapper {
            background-color: white;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            height: 650px;
            display: flex;
            flex-direction: column;
        }

        .btn-find-me {
            background-color: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
            border-radius: 14px;
            padding: 1rem;
            font-weight: 800;
            font-size: 1.05rem;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-find-me:hover {
            background-color: #C8E6C9;
            transform: translateY(-2px);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .custom-input {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 0.8rem 1.2rem;
            background-color: var(--input-bg);
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s;
            outline: none;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.1);
        }

        .btn-custom {
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-custom:hover {
            background-color: black;
            transform: translateY(-2px);
        }

        .playground-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .playground-list::-webkit-scrollbar {
            width: 6px;
        }

        .playground-list::-webkit-scrollbar-thumb {
            background-color: #E0E0E0;
            border-radius: 10px;
        }

        .custom-list-item {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .custom-list-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(255, 138, 101, 0.1);
            transform: translateY(-2px);
        }

        .custom-list-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .custom-list-item:hover::before {
            background-color: var(--primary-color);
        }

        .playground-name {
            color: var(--text-main);
            font-weight: 800;
            margin-bottom: 0.4rem;
            font-size: 1.1rem;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            word-break: keep-all;
            overflow-wrap: break-word;
            line-height: 1.3;
        }

        .playground-name i {
            margin-top: 3px;
        }

        .playground-address {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin: 0;
            line-height: 1.4;
            font-weight: 500;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-sub);
            text-align: center;
            padding: 2rem;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-weight: 600;
            margin: 0;
            word-break: keep-all;
        }

        .info-window-wrap {
            padding: 1.2rem;
            width: 250px;
            border-radius: 16px;
            background: white;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .info-title {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
            display: block;
            line-height: 1.3;
        }

        .info-address {
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 500;
            display: block;
            margin: 0;
            line-height: 1.4;
        }
    </style>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3e76fe79c83a7419b49f04db157ee82b&libraries=services"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="map-container">
    <div class="page-header">
        <i class="fa-solid fa-tree" style="font-size: 2rem; color: var(--primary-color);"></i>
        <h2>우리 동네 반려견 놀이터 찾기</h2>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="map-wrapper">
                <div id="map">
                    <div class="empty-state">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p>지도를 불러오는 중입니다...</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="sidebar-wrapper">
                <button id="find-me-btn" class="btn-find-me">
                    <i class="fa-solid fa-location-crosshairs"></i> 현재 내 위치로 이동
                </button>

                <div class="search-box">
                    <input type="text" id="search-keyword" class="custom-input" placeholder="지역이나 놀이터명 검색">
                    <button id="search-btn" class="btn-custom"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div id="playground-list" class="playground-list">
                    <div class="empty-state">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <p>목록을 불러오는 중입니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const timeoutCheck = setTimeout(() => {
            clearInterval(scriptCheck);
            if (typeof kakao === 'undefined' || !kakao.maps) {
                document.getElementById('map').innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-triangle-exclamation text-danger"></i>
                        <p class="text-danger">지도 로딩에 실패했습니다.<br>API 키 또는 인터넷 연결을 확인해주세요.</p>
                    </div>`;
            }
        }, 5000);

        const scriptCheck = setInterval(() => {
            if (typeof kakao !== 'undefined' && kakao.maps) {
                clearInterval(scriptCheck);
                clearTimeout(timeoutCheck);

                kakao.maps.load(async () => {
                    try {
                        document.getElementById('map').innerHTML = '';
                        const allPlaygrounds = await fetchPlaygrounds();
                        initializeMap(allPlaygrounds || []);
                    } catch (error) {
                        console.error("데이터 로드 실패:", error);
                    }
                });
            }
        }, 100);
    });

    async function fetchPlaygrounds(keyword = '') {
        const url = keyword ? `/api/playgrounds/search?keyword=${encodeURIComponent(keyword)}` : '/api/playgrounds';
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('놀이터 정보를 불러오지 못했습니다.');
            return await response.json();
        } catch (error) {
            console.error(error);
            document.getElementById('playground-list').innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-triangle-exclamation text-danger"></i>
                    <p class="text-danger">${error.message}</p>
                </div>`;
            return null;
        }
    }

    function initializeMap(initialPlaygrounds) {
        const mapContainer = document.getElementById('map');
        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
        const map = new kakao.maps.Map(mapContainer, { center: defaultPosition, level: 6 });

        let currentInfoWindow = null;
        const markers = [];
        let userMarker = null;

        const zoomControl = new kakao.maps.ZoomControl();
        map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

        const defaultImageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png';
        const defaultImageSize = new kakao.maps.Size(24, 35);
        const defaultMarkerImage = new kakao.maps.MarkerImage(defaultImageSrc, defaultImageSize);

        function moveToUserLocation(isInitialLoad = false) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const userPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);

                    map.setLevel(4, { animate: true });
                    map.panTo(userPosition);

                    if (!userMarker) {
                        const userImageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png';
                        const userMarkerImage = new kakao.maps.MarkerImage(userImageSrc, new kakao.maps.Size(31, 35));
                        userMarker = new kakao.maps.Marker({
                            map: map,
                            position: userPosition,
                            title: '내 위치',
                            image: userMarkerImage,
                            zIndex: 3
                        });
                    } else {
                        userMarker.setPosition(userPosition);
                    }
                }, () => {
                    if(!isInitialLoad) alert('위치 정보를 가져오는 데 실패했습니다.\n브라우저의 위치 권한을 허용해주세요.');
                }, { timeout: 10000 });
            } else {
                if(!isInitialLoad) alert('이 브라우저에서는 위치 정보 기능을 지원하지 않습니다.');
            }
        }

        setTimeout(() => {
            moveToUserLocation(true);
            displayMarkersAndList(initialPlaygrounds);
        }, 300);

        function displayMarkersAndList(playgrounds) {
            const listContainer = document.getElementById('playground-list');
            listContainer.innerHTML = '';

            markers.forEach(marker => marker.setMap(null));
            markers.length = 0;

            if (!playgrounds || playgrounds.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>검색 결과가 없습니다 🐾<br><span style="font-size:0.85rem; font-weight:400;">다른 키워드로 검색해보세요.</span></p>
                    </div>`;
                return;
            }

            const bounds = new kakao.maps.LatLngBounds();
            let addedMarkers = 0;

            playgrounds.forEach(pg => {
                if (!pg.latitude || !pg.longitude) return;

                const position = new kakao.maps.LatLng(pg.latitude, pg.longitude);
                const marker = new kakao.maps.Marker({
                    position: position,
                    title: pg.name,
                    image: defaultMarkerImage
                });

                marker.setMap(map);
                markers.push(marker);
                bounds.extend(position);
                addedMarkers++;

                const infowindow = new kakao.maps.InfoWindow({
                    content: `
                        <div class="info-window-wrap">
                            <span class="info-title">${pg.name}</span>
                            <span class="info-address">${pg.address || '주소 정보 없음'}</span>
                        </div>
                    `,
                    removable: true
                });

                const selectPlayground = () => {
                    if (currentInfoWindow) currentInfoWindow.close();
                    infowindow.open(map, marker);
                    currentInfoWindow = infowindow;
                    map.setLevel(4, { animate: true });
                    map.panTo(position);
                };

                kakao.maps.event.addListener(marker, 'click', selectPlayground);

                const listItem = document.createElement('a');
                listItem.href = '#';
                listItem.className = 'custom-list-item';
                listItem.innerHTML = `
                    <div class="playground-name"><i class="fa-solid fa-dog" style="color: var(--primary-color); font-size: 0.9rem;"></i> ${pg.name}</div>
                    <p class="playground-address">${pg.address || '주소 정보 없음'}</p>
                `;
                listItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectPlayground();
                });

                listContainer.appendChild(listItem);
            });

            if (addedMarkers > 0 && !userMarker) {
                map.setBounds(bounds);
            }
        }

        document.getElementById('search-btn').addEventListener('click', async () => {
            const keyword = document.getElementById('search-keyword').value.trim();
            listContainer.innerHTML = `
                <div class="empty-state">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p>검색 중입니다...</p>
                </div>`;
            const searchResult = await fetchPlaygrounds(keyword);
            if (searchResult) displayMarkersAndList(searchResult);
        });

        document.getElementById('search-keyword').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                document.getElementById('search-btn').click();
            }
        });

        document.getElementById('find-me-btn').addEventListener('click', () => {
            moveToUserLocation(false);
        });
    }
</script>
</body>
</html>
