<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 주문서 작성</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
            --kakao-yellow: #FEE500;
            --kakao-text: #191919;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .page-header {
            margin: 2rem 0;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
        }

        .checkout-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .section-title {
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .custom-input, .custom-select {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            background-color: var(--input-bg);
            transition: all 0.2s;
            outline: none;
            width: 100%;
            color: var(--text-main);
        }

        .custom-input:focus, .custom-select:focus {
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.1);
        }

        .custom-input:read-only {
            background-color: #F1F3F5;
            color: var(--text-sub);
            cursor: not-allowed;
        }

        .btn-search {
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            padding: 0 1.2rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-search:hover {
            background-color: var(--input-bg);
            border-color: var(--text-sub);
        }

        .order-item {
            display: flex;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .order-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            margin-right: 1rem;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-name {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.3rem;
            font-size: 1.05rem;
        }

        .item-price-qty {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .item-total {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
            text-align: right;
        }

        .summary-sticky {
            position: sticky;
            top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed var(--border-color);
        }

        .summary-total .label {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .summary-total .price {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .btn-kakaopay {
            background-color: var(--kakao-yellow);
            color: var(--kakao-text);
            border-radius: 14px;
            font-weight: 800;
            padding: 1.2rem;
            border: none;
            transition: all 0.2s;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-kakaopay:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(254, 229, 0, 0.4);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container" style="max-width: 1000px;">
    <div class="page-header">
        <h2>📝 주문서 작성</h2>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="checkout-card">
                <div class="section-title"><i class="fa-solid fa-location-dot" style="color: var(--primary-color);"></i> 배송지 정보</div>

                <div class="mb-3">
                    <label class="custom-label">받는 사람</label>
                    <input type="text" id="recipient" class="custom-input" th:value="${user.nickname}">
                </div>

                <div class="mb-3">
                    <label class="custom-label">연락처</label>
                    <input type="text" id="phone" class="custom-input" placeholder="010-0000-0000">
                </div>

                <div class="mb-3">
                    <label class="custom-label">주소</label>
                    <div class="d-flex gap-2 mb-2">
                        <input type="text" id="zipcode" class="custom-input" placeholder="우편번호" readonly style="flex-grow: 1;">
                        <button type="button" class="btn-search" onclick="execDaumPostcode()">주소 검색</button>
                    </div>
                    <input type="text" id="address" class="custom-input mb-2" placeholder="기본 주소" readonly>
                    <input type="text" id="detailAddress" class="custom-input" placeholder="상세 주소를 입력하세요">
                </div>

                <div class="mb-2">
                    <label class="custom-label">배송 요청사항</label>
                    <select id="requestMemo" class="custom-select">
                        <option value="문 앞에 놓아주세요">문 앞에 놓아주세요</option>
                        <option value="배송 전 연락바랍니다">배송 전 연락바랍니다</option>
                        <option value="부재 시 경비실에 맡겨주세요">부재 시 경비실에 맡겨주세요</option>
                        <option value="직접 입력">직접 입력</option>
                    </select>
                </div>
            </div>

            <div class="checkout-card">
                <div class="section-title"><i class="fa-solid fa-box-open" style="color: var(--primary-color);"></i> 주문 상품</div>

                <div class="order-list">
                    <div th:if="${!isDirectOrder}" th:each="item : ${cartItems}" class="order-item">
                        <img th:src="${item.product.thumbnailUrl}" class="item-img" onerror="this.src='https://via.placeholder.com/70?text=Img'">
                        <div class="item-info">
                            <div th:text="${item.product.name}" class="item-name">상품명</div>
                            <div class="item-price-qty">
                                <span th:text="${#numbers.formatInteger(item.product.currentPrice, 0, 'COMMA')}">10,000</span>원
                                x <span th:text="${item.count}">1</span>개
                            </div>
                        </div>
                        <div class="item-total" th:text="${#numbers.formatInteger(item.product.currentPrice * item.count, 0, 'COMMA')} + '원'">
                            10,000원
                        </div>
                    </div>

                    <div th:if="${isDirectOrder}" class="order-item">
                        <img th:src="${singleProduct.thumbnailUrl}" class="item-img" onerror="this.src='https://via.placeholder.com/70?text=Img'">
                        <div class="item-info">
                            <div th:text="${singleProduct.name}" class="item-name">상품명</div>
                            <div class="item-price-qty">
                                <span th:text="${#numbers.formatInteger(singleProduct.price, 0, 'COMMA')}">10,000</span>원
                                x <span th:text="${count}">1</span>개
                            </div>
                        </div>
                        <div class="item-total" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">
                            10,000원
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="checkout-card summary-sticky">
                <div class="section-title"><i class="fa-solid fa-receipt" style="color: var(--primary-color);"></i> 결제 금액</div>

                <div class="summary-row">
                    <span>총 상품금액</span>
                    <span class="text-dark" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">0원</span>
                </div>
                <div class="summary-row">
                    <span>배송비</span>
                    <span class="text-dark">0원 <span class="badge bg-light text-dark border ms-1">무료배송</span></span>
                </div>

                <div class="summary-total">
                    <span class="label">최종 결제금액</span>
                    <span class="price" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">0원</span>
                </div>

                <button onclick="requestPayment()" class="btn-kakaopay">
                    <i class="fa-solid fa-comment" style="font-size: 1.2rem;"></i> 카카오페이로 결제하기
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var IMP = window.IMP;
    IMP.init("imp22747340");

    const totalPrice = [[${totalPrice}]];
    const buyerEmail = [[${user.email}]];
    const buyerName = [[${user.nickname}]];
    const isDirectOrder = [[${isDirectOrder}]];

    let orderName = "";
    if (isDirectOrder) {
        orderName = [[${singleProduct?.name}]];
    } else {
        orderName = [[${cartItems != null && cartItems.size() > 0 ? cartItems[0].product.name : ''}]];
        const cartSize = [[${cartItems != null ? cartItems.size() : 0}]];
        if (cartSize > 1) {
            orderName += ' 외 ' + (cartSize - 1) + '건';
        }
    }

    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                var addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                document.getElementById('zipcode').value = data.zonecode;
                document.getElementById("address").value = addr;
                document.getElementById("detailAddress").focus();
            }
        }).open();
    }

    async function requestPayment() {
        const recipient = document.getElementById('recipient').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const detailAddress = document.getElementById('detailAddress').value;

        if (!recipient || !phone || !address || !detailAddress) {
            alert("배송지 정보를 모두 입력해주세요.");
            return;
        }

        if (!confirm("카카오페이로 결제를 진행하시겠습니까?")) return;

        const token = localStorage.getItem('Authorization');
        const apiUrl = isDirectOrder ? '/api/shop/order/direct' : '/api/shop/order';
        const bodyData = isDirectOrder ? {
            productId: [[${productId}]],
            count: [[${count}]],
            recipient: recipient,
            phoneNumber: phone,
            address: address + " " + detailAddress
        } : {
            recipient: recipient,
            phoneNumber: phone,
            address: address + " " + detailAddress
        };

        try {
            const orderResponse = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(bodyData)
            });

            if (!orderResponse.ok) {
                alert("주문 생성에 실패했습니다.");
                return;
            }

            const orderData = await orderResponse.json();
            const merchantUid = "ORD-" + orderData.orderId + "-" + new Date().getTime();

            IMP.request_pay({
                pg: "kakaopay",
                pay_method: "card",
                merchant_uid: merchantUid,
                name: orderName,
                amount: totalPrice,
                buyer_email: buyerEmail,
                buyer_name: buyerName,
                buyer_tel: phone,
                buyer_addr: address + " " + detailAddress,
                buyer_postcode: document.getElementById('zipcode').value
            }, async function (rsp) {
                if (rsp.success) {
                    try {
                        const verifyResponse = await fetch('/api/shop/payment/verify', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': token
                            },
                            body: JSON.stringify({
                                imp_uid: rsp.imp_uid,
                                merchant_uid: rsp.merchant_uid,
                                paid_amount: rsp.paid_amount,
                                pay_method: rsp.pay_method,
                                status: rsp.status
                            })
                        });

                        if (verifyResponse.ok) {
                            alert("결제가 완료되었습니다!");
                            window.location.href = "/shop/orders";
                        } else {
                            const errorText = await verifyResponse.text();
                            alert("결제 검증 실패: " + errorText);
                        }
                    } catch (e) {
                        alert("결제 검증 중 서버 오류가 발생했습니다.");
                    }
                } else {
                    alert("결제에 실패하였습니다.\n" + rsp.error_msg);
                }
            });

        } catch (e) {
            console.error(e);
            alert("서버 통신 오류가 발생했습니다.");
        }
    }
</script>
</body>
</html>
