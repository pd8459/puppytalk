<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 주문 내역</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .page-header {
            margin: 2.5rem 0 2rem 0;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
        }

        .order-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow: hidden;
            margin-bottom: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border-color: var(--primary-color);
        }

        .order-header {
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            padding: 1.2rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-date {
            font-weight: 600;
            color: var(--text-sub);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-body {
            padding: 1.5rem 1.8rem;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding-bottom: 1.2rem;
            margin-bottom: 1.2rem;
            border-bottom: 1px dashed var(--border-color);
        }

        .item-row:last-child {
            padding-bottom: 0;
            margin-bottom: 0;
            border-bottom: none;
        }

        .item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            margin-right: 1.2rem;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-name {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.05rem;
            margin-bottom: 0.3rem;
        }

        .item-meta {
            color: var(--text-sub);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .order-footer {
            background-color: var(--input-bg);
            padding: 1.2rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .total-price-label {
            font-weight: 700;
            color: var(--text-sub);
            margin-right: 0.5rem;
        }

        .total-price-value {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .badge-status {
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .status-ORDER { background-color: rgba(255, 138, 101, 0.1); color: var(--primary-color); }
        .status-PREPARING { background-color: #FFF3E0; color: #F57C00; }
        .status-SHIPPING { background-color: #E8F5E9; color: #388E3C; }
        .status-COMPLETED { background-color: #F5F5F5; color: #424242; }
        .status-CANCEL_REQUESTED { background-color: #FFEBEE; color: #D32F2F; }
        .status-CANCEL { background-color: #FFEBEE; color: #D32F2F; opacity: 0.7; }
        .status-PENDING { background-color: #F5F5F5; color: #9E9E9E; }

        .btn-action {
            border-radius: 12px;
            font-weight: 700;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-custom {
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-outline-custom:hover {
            background-color: var(--input-bg);
            border-color: var(--text-sub);
        }

        .btn-outline-danger-custom {
            background-color: white;
            border: 1px solid #FFCDD2;
            color: #D32F2F;
        }

        .btn-outline-danger-custom:hover {
            background-color: #FFEBEE;
            border-color: #D32F2F;
        }

        .btn-disabled {
            background-color: var(--border-color);
            color: var(--text-sub);
            border: none;
            cursor: not-allowed;
        }

        .empty-state {
            background: white;
            border-radius: 24px;
            padding: 6rem 2rem;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-top: 2rem;
        }

        .btn-custom-main {
            background-color: var(--primary-color);
            color: white;
            border-radius: 14px;
            font-weight: 800;
            padding: 1rem 3rem;
            border: none;
            transition: all 0.2s;
            display: inline-block;
            text-decoration: none;
        }

        .btn-custom-main:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,138,101,0.3);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container" style="max-width: 800px;">
    <div class="page-header">
        <h2>📦 내 주문 내역</h2>
    </div>

    <div id="order-list"></div>

    <div id="empty-message" class="empty-state d-none">
        <i class="fa-solid fa-box-open fa-4x mb-4" style="color: var(--border-color);"></i>
        <h4 class="fw-bold mb-3" style="color: var(--text-main);">아직 주문한 내역이 없습니다.</h4>
        <p class="text-muted mb-4">퍼피톡에서 강아지를 위한 따뜻한 선물을 골라보세요!</p>
        <a href="/shop/list" class="btn-custom-main">쇼핑하러 가기</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const StatusMap = {
        'PENDING': '결제대기',
        'ORDER': '결제완료',
        'PREPARING': '상품준비중',
        'SHIPPING': '배송중',
        'COMPLETED': '배송완료',
        'CANCEL_REQUESTED': '환불요청중',
        'CANCEL': '주문취소'
    };

    const token = localStorage.getItem('Authorization');

    window.addEventListener('DOMContentLoaded', loadOrders);

    async function loadOrders() {
        try {
            const response = await fetch('/api/shop/order/list', {
                headers: { 'Authorization': token }
            });

            if (response.status === 401 || response.status === 403) {
                alert('로그인이 필요합니다.');
                location.href = '/login';
                return;
            }
            if (!response.ok) throw new Error('불러오기 실패');

            const orders = await response.json();
            const listContainer = document.getElementById('order-list');
            const emptyMsg = document.getElementById('empty-message');

            if (orders.length === 0) {
                emptyMsg.classList.remove('d-none');
                return;
            }

            let html = '';

            orders.forEach(order => {
                let itemsHtml = '';
                order.orderItems.forEach(item => {
                    itemsHtml += `
                        <div class="item-row">
                            <img src="${item.thumbnailUrl || '/images/no-image.png'}" class="item-img" onerror="this.src='https://via.placeholder.com/80?text=Img'">
                            <div class="item-info">
                                <div class="item-name">${item.productName}</div>
                                <div class="item-meta">${item.orderPrice.toLocaleString()}원 × ${item.count}개</div>
                            </div>
                        </div>
                    `;
                });

                let actionButton = '';

                switch (order.status) {
                    case 'PENDING':
                        actionButton = `<a href="/shop/payment/${order.orderId}" class="btn-action btn-primary-custom text-decoration-none">결제하기</a>`;
                        break;
                    case 'ORDER':
                        actionButton = `<button class="btn-action btn-outline-danger-custom" onclick="cancelOrder(${order.orderId})">주문취소</button>`;
                        break;
                    case 'PREPARING':
                        actionButton = `<button class="btn-action btn-outline-custom" onclick="requestRefund(${order.orderId})">환불요청</button>`;
                        break;
                    case 'SHIPPING':
                        actionButton = `<button class="btn-action btn-disabled" disabled>배송중</button>`;
                        break;
                    case 'COMPLETED':
                        actionButton = `<button class="btn-action btn-outline-custom" onclick="requestRefund(${order.orderId})">반품/환불신청</button>`;
                        break;
                    case 'CANCEL_REQUESTED':
                        actionButton = `<button class="btn-action btn-disabled" disabled>처리 대기중</button>`;
                        break;
                    case 'CANCEL':
                        actionButton = '';
                        break;
                    default:
                        actionButton = '';
                }

                let dateStr = order.orderDate.replace('T', ' ').substring(0, 16);
                const statusText = StatusMap[order.status] || order.status;

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-date">
                                <i class="fa-regular fa-calendar" style="color: var(--primary-color);"></i>
                                ${dateStr}
                            </div>
                            <span class="badge-status status-${order.status}">${statusText}</span>
                        </div>
                        <div class="order-body">
                            ${itemsHtml}
                        </div>
                        <div class="order-footer">
                            <div>
                                <span class="total-price-label">총 결제금액</span>
                                <span class="total-price-value">${order.totalPrice.toLocaleString()}원</span>
                            </div>
                            <div>
                                ${actionButton}
                            </div>
                        </div>
                    </div>
                `;
            });

            listContainer.innerHTML = html;

        } catch (error) {
            console.error(error);
        }
    }

    async function cancelOrder(orderId) {
        if (!confirm('정말 주문을 취소하시겠습니까? (즉시 환불됩니다)')) return;
        try {
            const response = await fetch(`/api/shop/order/${orderId}/cancel`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                }
            });

            if (response.ok) {
                alert('주문이 정상적으로 취소되었습니다.');
                location.reload();
            } else {
                const errorText = await response.text();
                alert('취소 실패: ' + errorText);
            }
        } catch (e) {
            alert('오류 발생');
        }
    }

    async function requestRefund(orderId) {
        if (!confirm('환불/반품을 요청하시겠습니까? 관리자 확인 후 처리됩니다.')) return;
        try {
            const response = await fetch(`/api/shop/order/${orderId}/refund`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                }
            });

            if (response.ok) {
                alert('환불 요청이 접수되었습니다.');
                location.reload();
            } else {
                const errorText = await response.text();
                alert('요청 실패: ' + errorText);
            }
        } catch (e) {
            alert('오류 발생');
        }
    }
</script>
</body>
</html>
