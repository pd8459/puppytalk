<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 상품 등록</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EEEEEE;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        .page-header {
            margin: 2.5rem 0 2rem 0;
            text-align: center;
        }

        .page-header h2 {
            font-weight: 800;
            color: var(--text-main);
        }

        .form-wrapper {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            margin: 0 auto;
        }

        .custom-label {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .custom-input, .custom-select, .custom-textarea {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            background-color: var(--input-bg);
            transition: all 0.2s;
            outline: none;
            width: 100%;
            color: var(--text-main);
            font-size: 1rem;
        }

        .custom-input:focus, .custom-select:focus, .custom-textarea:focus {
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 138, 101, 0.1);
        }

        .section-card {
            background-color: var(--bg-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #FFE0B2;
        }

        .section-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border-radius: 14px;
            font-weight: 800;
            padding: 1.2rem;
            border: none;
            transition: all 0.2s;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 2rem;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,138,101,0.3);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container" style="max-width: 800px;">
    <div class="page-header">
        <h2>🎁 퍼피톡 상품 등록</h2>
        <p class="text-muted mt-2">새로운 강아지 용품을 등록해주세요!</p>
    </div>

    <div class="form-wrapper">
        <form id="product-form">
            <div class="mb-4">
                <label for="name" class="custom-label">상품명</label>
                <input type="text" class="custom-input" id="name" placeholder="상품 이름을 입력하세요" required>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label for="originalPrice" class="custom-label">정가 (원)</label>
                    <input type="number" class="custom-input" id="originalPrice" placeholder="0" required>
                </div>
                <div class="col-md-6">
                    <label for="stockQuantity" class="custom-label">재고 수량</label>
                    <input type="number" class="custom-input" id="stockQuantity" placeholder="0" required>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-bolt"></i> 할인 및 타임딜 설정</div>
                <div class="mb-4">
                    <label for="discountRate" class="custom-label">할인율 (%)</label>
                    <input type="number" class="custom-input" id="discountRate" placeholder="0" value="0">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="saleStartTime" class="custom-label">시작 시간 (선택)</label>
                        <input type="datetime-local" class="custom-input" id="saleStartTime">
                    </div>
                    <div class="col-md-6">
                        <label for="saleEndTime" class="custom-label">종료 시간 (선택)</label>
                        <input type="datetime-local" class="custom-input" id="saleEndTime">
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="description" class="custom-label">상세 설명</label>
                <textarea class="custom-textarea" id="description" rows="5" placeholder="상품에 대한 상세한 설명을 적어주세요." required></textarea>
            </div>

            <div class="mb-5">
                <label for="thumbnailUrl" class="custom-label">이미지 URL</label>
                <input type="text" class="custom-input" id="thumbnailUrl" placeholder="https://example.com/image.jpg">
            </div>

            <div class="section-card" style="background-color: #F3F0FF; border-color: #D1C4E9;">
                <div class="section-title" style="color: #673AB7;"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 맞춤 추천 설정</div>
                <div class="mb-4">
                    <label for="targetBreed" class="custom-label">추천 견종 (선택)</label>
                    <input type="text" class="custom-input" id="targetBreed" placeholder="예: 말티즈, 골든 리트리버">
                </div>
                <div>
                    <label for="recommendedSize" class="custom-label">권장 크기</label>
                    <select class="custom-select" id="recommendedSize">
                        <option value="ALL">전견종 (ALL)</option>
                        <option value="SMALL">소형견 (SMALL)</option>
                        <option value="MEDIUM">중형견 (MEDIUM)</option>
                        <option value="LARGE">대형견 (LARGE)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">상품 등록하기</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const originalPrice = document.getElementById('originalPrice').value;
        const stockQuantity = document.getElementById('stockQuantity').value;
        const description = document.getElementById('description').value;
        const thumbnailUrl = document.getElementById('thumbnailUrl').value;
        const discountRate = document.getElementById('discountRate').value || 0;

        let saleStartTime = document.getElementById('saleStartTime').value;
        let saleEndTime = document.getElementById('saleEndTime').value;

        if (saleStartTime && saleStartTime.length === 16) {
            saleStartTime += ':00';
        }
        if (saleEndTime && saleEndTime.length === 16) {
            saleEndTime += ':00';
        }

        const productData = {
            name: name,
            originalPrice: parseInt(originalPrice),
            discountRate: parseInt(discountRate),
            stockQuantity: parseInt(stockQuantity),
            description: description,
            thumbnailUrl: thumbnailUrl,
            targetBreed: document.getElementById('targetBreed').value || null,
            recommendedSize: document.getElementById('recommendedSize').value,
            saleStartTime: saleStartTime || null,
            saleEndTime: saleEndTime || null
        };

        const token = localStorage.getItem('Authorization');

        try {
            const response = await fetch('/api/shop/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(productData)
            });

            if (response.ok) {
                alert('상품이 성공적으로 등록되었습니다.');
                window.location.href = '/shop/list';
            } else {
                if (response.status === 401 || response.status === 403) {
                    alert('로그인이 필요하거나 권한이 없습니다.');
                } else {
                    alert('상품 등록 실패: ' + await response.text());
                }
            }
        } catch (error) {
            console.error(error);
            alert('오류가 발생했습니다.');
        }
    });
</script>
</body>
</html>
