<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 상품 등록</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <style>
        :root { --primary-color: #FF8A65; --primary-hover: #FF7043; --bg-color: #FFF9F5; --text-main: #333333; --border-color: #EEEEEE; --input-bg: #F8F9FA; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 5rem; }
        .form-wrapper { background: white; border-radius: 24px; padding: 3rem; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin: 0 auto; }
        .custom-label { font-weight: 700; margin-bottom: 0.6rem; font-size: 0.95rem; display: block; }
        .custom-input, .custom-select { border: 1px solid var(--border-color); border-radius: 12px; padding: 0.8rem 1.2rem; background-color: var(--input-bg); width: 100%; }
        .section-card { background-color: var(--bg-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #FFE0B2; }
        .btn-submit { background-color: var(--primary-color); color: white; border-radius: 14px; font-weight: 800; padding: 1.2rem; border: none; width: 100%; margin-top: 2rem; }
        .opt-name, .opt-price, .opt-stock { border: 1px solid var(--border-color); border-radius: 12px; padding: 0.8rem 1rem; background-color: var(--input-bg); width: 100%; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container" style="max-width: 900px;">
    <div class="text-center my-5">
        <h2 class="fw-bold">🎁 상품 등록</h2>
    </div>
    <div class="form-wrapper">
        <form id="product-form">
            <div class="mb-4">
                <label class="custom-label">카테고리</label>
                <select class="custom-select" id="categoryId" required>
                    <option value="1">사료/간식</option>
                    <option value="2">외출/산책</option>
                    <option value="3">목욕/미용</option>
                    <option value="4">의류/패션</option>
                    <option value="5">장난감</option>
                    <option value="6">하우스</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="custom-label">상품명</label>
                <input type="text" class="custom-input" id="name" required>
            </div>
            <div class="mb-4">
                <label class="custom-label">정가</label>
                <input type="number" class="custom-input" id="originalPrice" required>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="custom-label mb-0">상품 옵션 <span class="text-danger">*</span></label>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addOptionRow()">
                        <i class="fa-solid fa-plus"></i> 옵션 추가
                    </button>
                </div>
                <div id="options-container">
                    <div class="row g-2 mb-2 option-row">
                        <div class="col-5">
                            <input type="text" class="form-control opt-name" placeholder="옵션명 (예: 기본, S사이즈)" required>
                        </div>
                        <div class="col-3">
                            <input type="number" class="form-control opt-price" placeholder="추가 금액" value="0" required>
                        </div>
                        <div class="col-3">
                            <input type="number" class="form-control opt-stock" placeholder="재고 수량" value="10" required>
                        </div>
                        <div class="col-1">
                            <button type="button" class="btn btn-outline-danger w-100" onclick="removeOptionRow(this)"><i class="fa-solid fa-minus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <label class="custom-label">📸 상품 이미지 (여러 장 선택 가능)</label>
                <input type="file" class="custom-input" id="productFiles" accept="image/*" multiple required>
                <p class="text-muted small mt-2 mb-0">첫 번째 사진이 대표 썸네일이 되며, 나머지는 슬라이드 이미지로 등록됩니다.</p>
            </div>
            <div class="mb-5">
                <label class="custom-label">상세 설명</label>
                <div id="editor"></div>
            </div>
            <button type="submit" class="btn-submit">상품 등록하기</button>
        </form>
    </div>
</div>
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script>
    const getCookieToken = () => {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; Authorization=`);
        if (parts.length === 2) {
            return decodeURIComponent(parts.pop().split(';').shift());
        }
        return null;
    };
    const token = getCookieToken();

    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'wysiwyg',
        hooks: {
            addImageBlobHook: async (blob, callback) => {
                const formData = new FormData();
                formData.append('image', blob);
                const resp = await fetch('/api/shop/products/editor/image-upload', {
                    method: 'POST',
                    headers: { 'Authorization': token },
                    body: formData
                });
                if (resp.ok) callback(await resp.text(), '이미지');
            }
        }
    });

    function addOptionRow() {
        const container = document.getElementById('options-container');
        const row = document.createElement('div');
        row.className = 'row g-2 mb-2 option-row';
        row.innerHTML = `
            <div class="col-5">
                <input type="text" class="form-control opt-name" placeholder="옵션명" required>
            </div>
            <div class="col-3">
                <input type="number" class="form-control opt-price" placeholder="추가 금액" value="0" required>
            </div>
            <div class="col-3">
                <input type="number" class="form-control opt-stock" placeholder="재고 수량" value="10" required>
            </div>
            <div class="col-1">
                <button type="button" class="btn btn-outline-danger w-100" onclick="removeOptionRow(this)"><i class="fa-solid fa-minus"></i></button>
            </div>
        `;
        container.appendChild(row);
    }

    function removeOptionRow(btn) {
        const rows = document.querySelectorAll('.option-row');
        if (rows.length > 1) {
            btn.closest('.option-row').remove();
        } else {
            alert("최소 1개의 옵션은 등록해야 합니다.");
        }
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const optionRows = document.querySelectorAll('.option-row');
        const optionsArray = Array.from(optionRows).map(row => ({
            name: row.querySelector('.opt-name').value,
            extraPrice: parseInt(row.querySelector('.opt-price').value) || 0,
            stockQuantity: parseInt(row.querySelector('.opt-stock').value) || 0
        }));

        const dto = {
            categoryId: parseInt(document.getElementById('categoryId').value),
            name: document.getElementById('name').value,
            originalPrice: parseInt(document.getElementById('originalPrice').value),
            discountRate: 0,
            description: editor.getHTML(),
            options: optionsArray
        };

        const formData = new FormData();
        formData.append("dto", new Blob([JSON.stringify(dto)], { type: "application/json" }));

        const files = document.getElementById('productFiles').files;
        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
        }

        const response = await fetch('/api/shop/products', {
            method: 'POST',
            headers: { 'Authorization': token },
            body: formData
        });

        if (response.ok) {
            location.href = '/admin/products';
        } else {
            alert('실패: ' + await response.text());
        }
    });
</script>
</body>
</html>
