<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyTalk - 회원가입</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #FF8A65;
            --primary-hover: #FF7043;
            --bg-color: #FFF9F5;
            --text-main: #333333;
            --text-sub: #888888;
            --input-bg: #F8F9FA;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
        }

        .signup-container {
            background-color: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        .header-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-title p {
            margin: 0.5rem 0 0 0;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(255, 138, 101, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 12px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 1.2em;
        }

        .success { color: #2E7D32; background: #E8F5E9; padding: 0.8rem; border-radius: 8px; }
        .error { color: #C62828; background: #FFEBEE; padding: 0.8rem; border-radius: 8px; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="header-title">
        <h1>🐶 퍼피톡 가입하기</h1>
        <p>반려동물과 함께하는 즐거운 대화</p>
    </div>

    <form id="signup-form">
        <div class="input-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="영문, 숫자 조합" required>
        </div>
        <div class="input-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" name="nickname" placeholder="귀여운 닉네임을 지어주세요" required>
        </div>
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="8자리 이상 입력" required>
        </div>
        <button type="submit" id="submit-btn">가입하기</button>
    </form>
    <div id="message"></div>
</div>

<script>
    const form = document.getElementById('signup-form');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        submitBtn.disabled = true;
        submitBtn.textContent = '가입 처리 중... 🐾';
        messageDiv.textContent = '';
        messageDiv.className = '';

        const username = document.getElementById('username').value;
        const nickname = document.getElementById('nickname').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const data = { username, email, nickname, password };

        try {
            const response = await fetch('/api/users/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                messageDiv.textContent = '가입 완료! 멍멍! 🐶 잠시 후 이동합니다.';
                messageDiv.className = 'success';
                setTimeout(() => {
                    window.location.href = '/main';
                }, 2000);
            } else {
                const errorData = await response.json();
                messageDiv.textContent = errorData.message || '회원가입에 실패했습니다.';
                messageDiv.className = 'error';
                submitBtn.disabled = false;
                submitBtn.textContent = '가입하기';
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.textContent = '서버와 연결할 수 없습니다. 다시 시도해주세요.';
            messageDiv.className = 'error';
            submitBtn.disabled = false;
            submitBtn.textContent = '가입하기';
        }
    });
</script>

</body>
</html>
